name = "nodepin-dashboard"
main = "src/worker.js"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

# Static assets
assets = { directory = "./public", binding = "ASSETS" }

[[d1_databases]]
binding = "DB"
database_name = "nodepin-db"
database_id = ""

[vars]
ENVIRONMENT = "production"

[placement]
mode = "smart"
name = "nodepin-dashboard"
main = "src/worker.js"
compatibility_date = "2026-7-12"
compatibility_flags = ["nodejs_compat"]

[[d1_databases]]
binding = "DB"
database_name = "nodepin-db"
database_id = ""

[vars]
ENVIRONMENT = "production"

[placement]
mode = "smart"
