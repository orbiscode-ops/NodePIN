<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NodePIN — إعداد الشبكات</title>
  <style>
    :root {
      --bg:#0b1120; --surface:#111827; --card:#1e293b; --border:#1e3a5f;
      --text:#f1f5f9; --muted:#64748b; --accent:#38bdf8;
      --green:#34d399; --red:#f87171; --yellow:#fbbf24;
    }
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:"Segoe UI",Tahoma,system-ui,sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }

    header {
      display:flex; align-items:center; justify-content:space-between;
      padding:.9rem 2rem; background:var(--surface); border-bottom:1px solid var(--border);
    }
    .logo { font-size:1.1rem; font-weight:700; color:var(--accent); }
    .logo span { color:var(--text); }

    .page { max-width:860px; margin:2rem auto; padding:0 1rem; }

    .card { background:var(--card); border:1px solid var(--border); border-radius:14px; padding:1.5rem; margin-bottom:1.25rem; }
    h2 { font-size:1.1rem; margin-bottom:.3rem; }
    .sub { color:var(--muted); font-size:.85rem; margin-bottom:1.25rem; }

    /* ── Network list ── */
    .net-list { display:flex; flex-direction:column; gap:.75rem; }
    .net-item {
      background:var(--surface); border:1px solid var(--border);
      border-radius:10px; overflow:hidden;
    }
    .net-header {
      display:flex; align-items:center; justify-content:space-between;
      padding:.85rem 1rem; cursor:pointer;
    }
    .net-header:hover { background:#161f30; }
    .net-header .net-name { font-weight:600; font-size:.95rem; display:flex; align-items:center; gap:.6rem; }
    .net-header .net-image { font-size:.75rem; color:var(--muted); }
    .net-header .net-actions { display:flex; gap:.5rem; align-items:center; }
    .net-body { padding:1rem; border-top:1px solid var(--border); display:none; }
    .net-body.open { display:block; }

    /* ── Env vars table ── */
    .env-row { display:flex; gap:.5rem; margin-bottom:.5rem; align-items:center; }
    .env-row input {
      flex:1; padding:.45rem .75rem; background:#0b1120;
      border:1px solid var(--border); border-radius:7px;
      color:var(--text); font-size:.875rem; font-family:monospace;
    }
    .env-row input:focus { outline:none; border-color:var(--accent); }
    .env-row input.key { flex:.8; color:var(--accent); }
    .env-row input.val { flex:1.2; }
    .env-row .del-btn {
      background:none; border:none; color:var(--red);
      cursor:pointer; font-size:1.1rem; padding:.2rem .4rem;
      border-radius:4px; transition:background .15s;
    }
    .env-row .del-btn:hover { background:#2d0a0a; }
    .add-var-btn {
      background:none; border:1px dashed var(--border); color:var(--muted);
      padding:.4rem .9rem; border-radius:7px; cursor:pointer;
      font-size:.8rem; margin-top:.35rem; transition:all .15s;
    }
    .add-var-btn:hover { border-color:var(--accent); color:var(--accent); }

    /* Status badge */
    .badge {
      font-size:.7rem; padding:.15rem .55rem; border-radius:999px; font-weight:700;
    }
    .badge.on  { background:#052e16; color:var(--green); }
    .badge.off { background:#1e293b; color:var(--muted); }

    /* Add network form */
    .add-form { display:flex; gap:.75rem; flex-wrap:wrap; align-items:flex-end; }
    .add-form .field { flex:1; min-width:160px; }
    .add-form label { display:block; font-size:.8rem; color:var(--muted); margin-bottom:.35rem; }
    .add-form input {
      width:100%; padding:.5rem .8rem; background:#0b1120;
      border:1px solid var(--border); border-radius:8px;
      color:var(--text); font-size:.9rem;
    }
    .add-form input:focus { outline:none; border-color:var(--accent); }

    /* Buttons */
    .btn {
      padding:.5rem 1.2rem; border-radius:8px; border:none;
      font-weight:700; cursor:pointer; font-size:.875rem; transition:opacity .15s;
      white-space:nowrap;
    }
    .btn:hover { opacity:.85; }
    .btn-primary { background:var(--accent); color:#0b1120; }
    .btn-success { background:var(--green); color:#052e16; }
    .btn-danger  { background:#7f1d1d; color:var(--red); }
    .btn-ghost   { background:transparent; color:var(--muted); border:1px solid var(--border); }

    /* Msg */
    .msg { padding:.65rem 1rem; border-radius:8px; margin:.75rem 0; font-size:.875rem; display:none; }
    .msg.show { display:block; }
    .msg.error   { background:#2d0a0a; border:1px solid var(--red);   color:var(--red); }
    .msg.success { background:#052e16; border:1px solid var(--green); color:var(--green); }
    .msg.info    { background:#0c2233; border:1px solid var(--accent);color:var(--accent); }

    .spinner { display:inline-block; width:14px; height:14px; border:2px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin .7s linear infinite; vertical-align:middle; }
    @keyframes spin { to { transform:rotate(360deg); } }

    .empty { color:var(--muted); text-align:center; padding:2rem; font-size:.9rem; }
  </style>
</head>
<body>

<header>
  <div class="logo">Node<span>PIN</span></div>
  <a href="/" style="color:var(--muted);font-size:.85rem;text-decoration:none">← الداشبورد</a>
</header>

<div class="page">

  <!-- ── إضافة شبكة جديدة ── -->
  <div class="card">
    <h2>➕ إضافة شبكة</h2>
    <p class="sub">أضف أي شبكة تريدها — اسم + صورة Docker + متغيرات البيئة المطلوبة</p>
    <div class="add-form">
      <div class="field">
        <label>اسم الشبكة *</label>
        <input id="new-name" placeholder="مثال: earnapp" />
      </div>
      <div class="field" style="flex:2">
        <label>Docker Image *</label>
        <input id="new-image" placeholder="مثال: earnapp/earnapp:latest" />
      </div>
      <button class="btn btn-primary" onclick="addNetwork()">إضافة</button>
    </div>
    <div id="msg-add" class="msg"></div>
  </div>

  <!-- ── الشبكات المضافة ── -->
  <div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem">
      <div>
        <h2>الشبكات</h2>
        <p class="sub" style="margin:0">أضف متغيرات البيئة لكل شبكة ثم شغّلها</p>
      </div>
      <button class="btn btn-success" onclick="startAll()" id="start-btn">🚀 تشغيل الكل</button>
    </div>

    <div id="msg-main" class="msg"></div>
    <div id="net-list" class="net-list">
      <div class="empty">لا توجد شبكات — أضف شبكة أعلاه</div>
    </div>
  </div>

</div>

<script>
// ── State ─────────────────────────────────────────────
// networks: { name, image, vars: [{k,v}], enabled }
let networks = [];

// ── Init ──────────────────────────────────────────────
async function init() {
  // Load saved state from backend
  const r = await fetch('/api/setup/custom').catch(()=>null);
  if (r?.ok) {
    const data = await r.json();
    networks = data.networks || [];
  }
  render();
}

// ── Render ────────────────────────────────────────────
function render() {
  const el = document.getElementById('net-list');
  if (!networks.length) {
    el.innerHTML = '<div class="empty">لا توجد شبكات — أضف شبكة أعلاه</div>';
    return;
  }
  el.innerHTML = networks.map((net, i) => `
    <div class="net-item" id="net-${i}">
      <div class="net-header" onclick="toggleBody(${i})">
        <div>
          <div class="net-name">
            <span>${net.name}</span>
            <span class="badge ${net.enabled ? 'on' : 'off'}">${net.enabled ? 'يعمل' : 'متوقف'}</span>
          </div>
          <div class="net-image">${net.image}</div>
        </div>
        <div class="net-actions">
          <button class="btn btn-success" style="font-size:.8rem;padding:.35rem .8rem" onclick="event.stopPropagation();startNet(${i})">▶ تشغيل</button>
          <button class="btn btn-danger"  style="font-size:.8rem;padding:.35rem .8rem" onclick="event.stopPropagation();stopNet(${i})">■ إيقاف</button>
          <button class="btn btn-ghost"   style="font-size:.8rem;padding:.35rem .8rem;color:var(--red)" onclick="event.stopPropagation();removeNet(${i})">حذف</button>
        </div>
      </div>
      <div class="net-body" id="body-${i}">
        <p style="font-size:.8rem;color:var(--muted);margin-bottom:.75rem">متغيرات البيئة (Environment Variables)</p>
        <div id="vars-${i}">
          ${(net.vars||[]).map((v,j) => varRow(i,j,v.k,v.v)).join('')}
        </div>
        <button class="add-var-btn" onclick="addVar(${i})">+ إضافة متغير</button>
        <div style="margin-top:.75rem;display:flex;gap:.5rem">
          <button class="btn btn-primary" style="font-size:.8rem" onclick="saveNet(${i})">💾 حفظ</button>
        </div>
      </div>
    </div>
  `).join('');
}

function varRow(ni, ji, k='', v='') {
  return `<div class="env-row" id="var-${ni}-${ji}">
    <input class="key" placeholder="اسم المتغير" value="${esc(k)}" oninput="updateVar(${ni},${ji},'k',this.value)">
    <input class="val" placeholder="القيمة" type="${k.toLowerCase().includes('pass')||k.toLowerCase().includes('secret')||k.toLowerCase().includes('token')?'password':'text'}" value="${esc(v)}" oninput="updateVar(${ni},${ji},'v',this.value)">
    <button class="del-btn" onclick="removeVar(${ni},${ji})" title="حذف">✕</button>
  </div>`;
}

function esc(s) { return String(s||'').replace(/"/g,'&quot;'); }

// ── Toggle expand ─────────────────────────────────────
function toggleBody(i) {
  const b = document.getElementById(`body-${i}`);
  b.classList.toggle('open');
}

// ── Add network ───────────────────────────────────────
function addNetwork() {
  const name  = document.getElementById('new-name').value.trim().toLowerCase().replace(/\s+/g,'-');
  const image = document.getElementById('new-image').value.trim();
  clearMsg('msg-add');

  if (!name)  return showMsg('msg-add', 'اكتب اسم الشبكة');
  if (!image) return showMsg('msg-add', 'اكتب صورة Docker');
  if (networks.find(n=>n.name===name)) return showMsg('msg-add', 'هذه الشبكة موجودة بالفعل');

  networks.push({ name, image, vars:[], enabled:false });
  document.getElementById('new-name').value  = '';
  document.getElementById('new-image').value = '';
  render();
  // فتح تلقائي للشبكة المضافة
  setTimeout(() => toggleBody(networks.length-1), 50);
}

// ── Var management ────────────────────────────────────
function addVar(ni) {
  networks[ni].vars.push({ k:'', v:'' });
  render();
  setTimeout(() => document.getElementById(`body-${ni}`)?.classList.add('open'), 50);
}

function removeVar(ni, ji) {
  networks[ni].vars.splice(ji, 1);
  render();
  setTimeout(() => document.getElementById(`body-${ni}`)?.classList.add('open'), 50);
}

function updateVar(ni, ji, field, val) {
  if (networks[ni]?.vars[ji]) networks[ni].vars[ji][field] = val;
}

// ── Remove network ────────────────────────────────────
async function removeNet(i) {
  if (!confirm(`حذف شبكة "${networks[i].name}"؟`)) return;
  await stopNet(i, true);
  networks.splice(i, 1);
  await saveAll();
  render();
}

// ── Save single network ───────────────────────────────
async function saveNet(i) {
  // Sync current DOM values
  document.querySelectorAll(`#vars-${i} .env-row`).forEach((row, j) => {
    const k = row.querySelector('.key')?.value?.trim();
    const v = row.querySelector('.val')?.value?.trim();
    if (networks[i].vars[j]) { networks[i].vars[j].k = k; networks[i].vars[j].v = v; }
  });
  await saveAll();
  showMsg('msg-main', `✅ تم حفظ "${networks[i].name}"`, 'success');
}

async function saveAll() {
  await fetch('/api/setup/custom', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ networks }),
  });
}

// ── Start / Stop ──────────────────────────────────────
async function startNet(i) {
  await saveNet(i);
  showMsg('msg-main', `<span class="spinner"></span> جاري تشغيل ${networks[i].name}…`, 'info');
  const r = await fetch('/api/setup/start-one', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ network: networks[i] }),
  });
  const d = await r.json();
  if (r.ok) {
    networks[i].enabled = true;
    render();
    showMsg('msg-main', `✅ ${networks[i].name} يعمل الآن`, 'success');
  } else {
    showMsg('msg-main', `❌ ${d.error}`, 'error');
  }
}

async function stopNet(i, silent=false) {
  const r = await fetch('/api/setup/stop-one', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ name: networks[i].name }),
  });
  networks[i].enabled = false;
  if (!silent) { render(); showMsg('msg-main', `⏹ ${networks[i].name} متوقف`, 'info'); }
}

async function startAll() {
  const btn = document.getElementById('start-btn');
  btn.innerHTML = '<span class="spinner"></span>';
  btn.disabled = true;
  await saveAll();
  const r = await fetch('/api/setup/start-all', { method:'POST' });
  const d = await r.json();
  btn.innerHTML = '🚀 تشغيل الكل'; btn.disabled = false;
  if (r.ok) {
    networks.forEach(n => n.enabled = true);
    render();
    showMsg('msg-main', '✅ كل الشبكات تعمل', 'success');
  } else {
    showMsg('msg-main', '❌ ' + d.error, 'error');
  }
}

// ── Msg helpers ───────────────────────────────────────
function showMsg(id, text, type='error') {
  const el = document.getElementById(id);
  el.innerHTML = text; el.className = `msg ${type} show`;
  if (type !== 'error') setTimeout(() => el.className='msg', 4000);
}
function clearMsg(id) {
  const el = document.getElementById(id);
  el.className='msg'; el.innerHTML='';
}

init();
</script>
</body>
</html>
