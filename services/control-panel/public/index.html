<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NodePIN Dashboard</title>
  <style>
    :root {
      --bg:       #0b1120;
      --surface:  #111827;
      --card:     #1e293b;
      --border:   #1e3a5f;
      --text:     #f1f5f9;
      --muted:    #64748b;
      --accent:   #38bdf8;
      --green:    #34d399;
      --red:      #f87171;
      --yellow:   #fbbf24;
      --purple:   #a78bfa;
    }
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

    body {
      font-family: "Segoe UI", Tahoma, system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── Top bar ── */
    header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 1rem 2rem;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      position: sticky; top: 0; z-index: 10;
    }
    .logo { font-size: 1.25rem; font-weight: 700; color: var(--accent); letter-spacing: .5px; }
    .logo span { color: var(--text); }
    .header-right { display: flex; align-items: center; gap: 1rem; }
    #last-update { font-size: .8rem; color: var(--muted); }
    .btn {
      background: var(--accent); color: #0b1120; border: none;
      padding: .4rem .9rem; border-radius: 6px; font-weight: 700;
      cursor: pointer; font-size: .85rem; transition: opacity .15s;
    }
    .btn:hover { opacity: .85; }
    .btn-ghost {
      background: transparent; color: var(--muted); border: 1px solid var(--border);
    }
    .btn-ghost:hover { color: var(--text); border-color: var(--accent); }

    /* ── Layout ── */
    main { padding: 1.5rem 2rem; max-width: 1400px; margin: 0 auto; }

    /* ── Summary strip ── */
    .summary {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 1rem; margin-bottom: 1.75rem;
    }
    .stat-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 12px; padding: 1rem 1.25rem;
    }
    .stat-card .label { font-size: .75rem; color: var(--muted); margin-bottom: .4rem; text-transform: uppercase; letter-spacing: .5px; }
    .stat-card .value { font-size: 1.6rem; font-weight: 700; }
    .stat-card .value.green  { color: var(--green); }
    .stat-card .value.yellow { color: var(--yellow); }
    .stat-card .value.accent { color: var(--accent); }

    /* ── Section titles ── */
    .section-title {
      font-size: .85rem; font-weight: 600; color: var(--muted);
      text-transform: uppercase; letter-spacing: 1px;
      margin: 1.75rem 0 .9rem;
      display: flex; align-items: center; gap: .5rem;
    }
    .section-title::after {
      content: ''; flex: 1; height: 1px; background: var(--border);
    }

    /* ── Cards grid ── */
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1.25rem; }

    .card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 12px; padding: 1.25rem;
      transition: border-color .2s;
    }
    .card:hover { border-color: var(--accent); }

    .card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: .9rem; }
    .card-title { font-weight: 700; font-size: 1rem; }
    .card-subtitle { font-size: .75rem; color: var(--muted); margin-top: .15rem; }

    /* Badge */
    .badge {
      display: inline-flex; align-items: center; gap: .35rem;
      padding: .2rem .65rem; border-radius: 999px;
      font-size: .75rem; font-weight: 700;
    }
    .badge::before { content: '●'; font-size: .6rem; }
    .badge.running  { background: #052e16; color: var(--green); }
    .badge.stopped  { background: #450a0a; color: var(--red); }
    .badge.starting { background: #1c1109; color: var(--yellow); }
    .badge.error    { background: #3b0a0a; color: var(--red); }
    .badge.ok       { background: #052e16; color: var(--green); }

    /* Rows inside card */
    .row { display: flex; justify-content: space-between; align-items: center;
           padding: .4rem 0; border-bottom: 1px solid #1e3a5f22; font-size: .875rem; }
    .row:last-child { border-bottom: none; }
    .row .key { color: var(--muted); }
    .row .val { text-align: left; word-break: break-all; max-width: 55%; }

    /* Earnings highlight */
    .earnings-box {
      margin-top: .9rem; padding: .75rem; border-radius: 8px;
      background: #0d1f11; border: 1px solid #1a3a23;
      display: flex; align-items: center; justify-content: space-between;
    }
    .earnings-box .earn-label { font-size: .75rem; color: var(--muted); }
    .earnings-box .earn-value { font-size: 1.25rem; font-weight: 700; color: var(--green); }

    /* Empty / loading states */
    .placeholder { color: var(--muted); font-size: .9rem; padding: 2rem; text-align: center; }
    .spinner {
      display: inline-block; width: 18px; height: 18px;
      border: 2px solid var(--border); border-top-color: var(--accent);
      border-radius: 50%; animation: spin .7s linear infinite;
      vertical-align: middle; margin-left: .4rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Footer */
    footer {
      text-align: center; padding: 2rem; color: var(--muted); font-size: .8rem;
      border-top: 1px solid var(--border); margin-top: 2rem;
    }

    /* Inline Config Input */
    .inline-input-group {
      display: flex; gap: 0.5rem; margin-top: 0.75rem; width: 100%;
    }
    .inline-input {
      flex: 1; background: var(--bg); border: 1px solid var(--border);
      border-radius: 6px; padding: 0.35rem 0.6rem; color: var(--text);
      font-size: 0.8rem; outline: none; transition: border-color 0.15s;
    }
    .inline-input:focus { border-color: var(--accent); }
    .btn-sm {
      padding: 0.35rem 0.75rem; font-size: 0.75rem; border-radius: 6px;
    }

    /* Logout */
    #logout-btn { display: none; }

    @media (max-width: 600px) {
      header, main { padding-left: 1rem; padding-right: 1rem; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">Node<span>PIN</span> <span style="font-size:.75rem;color:var(--muted);font-weight:400">Dashboard</span></div>
  <div class="header-right">
    <span id="last-update"></span>
    <button class="btn" onclick="refreshAll()">⟳ تحديث</button>
    <button class="btn btn-ghost" id="logout-btn" onclick="doLogout()">خروج</button>
  </div>
</header>

<main>
  <!-- Summary strip -->
  <div class="summary" id="summary">
    <div class="stat-card"><div class="label">الحاويات</div><div class="value accent" id="s-total">—</div></div>
    <div class="stat-card"><div class="label">تعمل</div><div class="value green" id="s-running">—</div></div>
    <div class="stat-card"><div class="label">متوقفة</div><div class="value" id="s-stopped">—</div></div>
    <div class="stat-card"><div class="label">الشبكات المفعّلة</div><div class="value accent" id="s-networks">—</div></div>
  </div>

  <!-- Containers -->
  <div class="section-title">الحاويات</div>
  <div id="containers" class="grid"><div class="placeholder">جاري التحميل… <span class="spinner"></span></div></div>

  <!-- Metrics -->
  <div class="section-title">الأرباح والشبكات</div>
  <div id="metrics" class="grid"><div class="placeholder">جاري التحميل… <span class="spinner"></span></div></div>
</main>

<footer>NodePIN — بنية node لامركزية قابلة للتوسيع 💡</footer>

<script>
// ── helpers ──────────────────────────────────────────
function badge(state) {
  const map = { running:'running', exited:'stopped', stopped:'stopped', starting:'starting', error:'error', ok:'running', no_identity:'stopped' };
  const cls = map[state] || 'stopped';
  const labels = { running:'يعمل', stopped:'متوقف', starting:'قيد الإقلاع', error:'خطأ', no_identity:'بدون هوية' };
  return `<span class="badge ${cls}">${labels[state] || state}</span>`;
}

function row(key, val) {
  if (val === null || val === undefined || val === '') return '';
  return `<div class="row"><span class="key">${key}</span><span class="val">${val}</span></div>`;
}

function fmt(n, unit='') {
  if (n === null || n === undefined) return '—';
  if (typeof n === 'number') return n.toLocaleString('en') + (unit ? ' ' + unit : '');
  return n;
}

function fmtBytes(b) {
  if (!b) return '—';
  const units = ['B','KB','MB','GB','TB'];
  let i = 0; let v = b;
  while (v >= 1024 && i < units.length-1) { v /= 1024; i++; }
  return v.toFixed(1) + ' ' + units[i];
}

function fmtEarnings(info) {
  if (info.earnings === null || info.earnings === undefined) return null;
  if (info.network === 'storj') return '$' + (info.earnings / 100).toFixed(2);
  return info.earnings + ' ' + (info.token || '');
}

function ts() { return new Date().toLocaleTimeString('ar-SA'); }

// ── logout ────────────────────────────────────────────
async function doLogout() {
  await fetch('/api/logout', { method:'POST' });
  location.reload();
}

// Check auth status to show/hide logout btn
async function checkAuth() {
  const r = await fetch('/api/health').catch(() => null);
  if (r && r.ok) {
    const h = r.headers.get('x-auth-disabled');
    if (!h) document.getElementById('logout-btn').style.display = 'inline-flex';
  }
}

// ── containers ────────────────────────────────────────
async function loadContainers() {
  const el = document.getElementById('containers');
  try {
    const res = await fetch('/api/containers');
    if (!res.ok) throw new Error(res.statusText);
    const data = await res.json();
    const cs = data.containers || [];

    // update summary
    document.getElementById('s-total').textContent   = cs.length;
    document.getElementById('s-running').textContent = cs.filter(c=>c.state==='running').length;
    document.getElementById('s-stopped').textContent = cs.filter(c=>c.state!=='running').length;

    if (!cs.length) { el.innerHTML = '<div class="placeholder">لا توجد حاويات NodePIN</div>'; return; }

    el.innerHTML = cs.map(c => `
      <div class="card">
        <div class="card-header">
          <div>
            <div class="card-title">${c.name}</div>
            <div class="card-subtitle">${c.image}</div>
          </div>
          ${badge(c.state)}
        </div>
        ${row('الحالة', c.status)}
        ${row('المنافذ', c.ports || '—')}
      </div>
    `).join('');
  } catch(e) {
    el.innerHTML = `<div class="placeholder" style="color:var(--red)">فشل تحميل الحاويات: ${e.message}</div>`;
  }
}

// ── metrics ───────────────────────────────────────────
async function loadMetrics() {
  const el = document.getElementById('metrics');
  try {
    const res = await fetch('/api/metrics');
    if (!res.ok) throw new Error(res.statusText);
    const data = await res.json();
    const entries = Object.entries(data.nodes || {});

    document.getElementById('s-networks').textContent = entries.length;

    if (!entries.length) { el.innerHTML = '<div class="placeholder">لا توجد شبكات مفعّلة</div>'; return; }

    el.innerHTML = entries.map(([name, info]) => {
      const x = info.extra || {};
      const earned = fmtEarnings(info);
      let extraRows = '';

      if (name === 'mysterium') {
        const errorRow = x.message || x.error;
        extraRows = [
          row('الخطأ', errorRow),
          row('الهوية', x.identity ? x.identity.slice(0,16)+'…' : null),
          row('حالة التسجيل', x.registrationStatus),
          row('الرصيد', x.balance !== undefined ? fmt(x.balance)+' MYST (wei)' : null),
          row('أرباح غير مستوفاة', x.earningsUnsettled !== undefined ? fmt(x.earningsUnsettled)+' wei' : null),
          (info.status === 'error' && errorRow && errorRow.includes('403')) ? `
            <div class="inline-input-group">
              <input type="password" id="myst-pwd-input" class="inline-input" placeholder="أدخل كلمة مرور Mysterium">
              <button class="btn btn-sm" onclick="saveMysteriumPassword()">حفظ</button>
            </div>
          ` : ''
        ].join('');
      } else if (name === 'storj') {
        extraRows = [
          row('Node ID', x.nodeID ? x.nodeID.slice(0,16)+'…' : null),
          row('الإصدار', x.version),
          row('محدّث', x.upToDate ? '✅ نعم' : x.upToDate === false ? '⚠️ لا' : null),
          row('مساحة مستخدمة', fmtBytes(x.diskSpaceUsed)),
          row('مساحة متاحة', fmtBytes(x.diskSpaceAvailable)),
          row('البيانات المنقولة', fmtBytes(x.bandwidthUsed)),
          row('الأقمار الصناعية', x.satellitesCount),
        ].join('');
      } else if (name === 'packetstream') {
        extraRows = x.dashboardUrl ? row('لوحة التحكم', `<a href="${x.dashboardUrl}" target="_blank" style="color:var(--accent)">${x.dashboardUrl}</a>`) : '';
      } else if (name === 'anyone') {
        extraRows = x.dashboard ? row('لوحة التحكم', `<a href="${x.dashboard}" target="_blank" style="color:var(--accent)">${x.dashboard}</a>`) : '';
      } else {
        extraRows = Object.entries(x)
          .filter(([,v]) => v !== null && v !== undefined && v !== '')
          .map(([k,v]) => row(k, v)).join('');
      }

      return `
        <div class="card">
          <div class="card-header">
            <div>
              <div class="card-title">${name.toUpperCase()}</div>
              <div class="card-subtitle">${info.token || ''}</div>
            </div>
            ${badge(info.status)}
          </div>
          ${extraRows}
          ${earned ? `
            <div class="earnings-box">
              <span class="earn-label">إجمالي الأرباح</span>
              <span class="earn-value">${earned}</span>
            </div>` : ''}
        </div>
      `;
    }).join('');
  } catch(e) {
    el.innerHTML = `<div class="placeholder" style="color:var(--red)">فشل تحميل المقاييس: ${e.message}</div>`;
  }
}

async function saveMysteriumPassword() {
  const pwd = document.getElementById('myst-pwd-input').value;
  if (!pwd) return alert('الرجاء كتابة كلمة المرور');
  try {
    const res = await fetch('/api/mysterium/password', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password: pwd })
    });
    const data = await res.json();
    if (res.ok) {
      alert('تم حفظ كلمة المرور وتحديث اللوحة بنجاح!');
      refreshAll();
    } else {
      alert('خطأ أثناء الحفظ: ' + data.error);
    }
  } catch (e) {
    alert('فشل الاتصال: ' + e.message);
  }
}

// ── main loop ─────────────────────────────────────────
async function refreshAll() {
  document.getElementById('last-update').textContent = 'آخر تحديث: ' + ts();
  await Promise.all([loadContainers(), loadMetrics()]);
}

checkAuth();
refreshAll();
setInterval(refreshAll, 30_000);
</script>
</body>
</html>
