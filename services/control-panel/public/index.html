<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NodePIN — Sentinel Dashboard</title>
  <link rel="stylesheet" href="/app.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div id="app">
    <!-- Login Screen -->
    <div id="login-screen" class="screen active">
      <div class="login-container">
        <div class="login-logo">
          <div class="logo-icon">N</div>
          <h1>NodePIN</h1>
          <p class="login-subtitle">Sentinel Dashboard</p>
        </div>

        <!-- Setup Form (first time) -->
        <form id="setup-form" class="login-form hidden">
          <p class="setup-note">First time? Set your dashboard password.</p>
          <div class="form-group">
            <label for="setup-password">Password</label>
            <input type="password" id="setup-password" placeholder="Min 8 characters" minlength="8" required>
          </div>
          <div class="form-group">
            <label for="setup-confirm">Confirm Password</label>
            <input type="password" id="setup-confirm" placeholder="Repeat password" minlength="8" required>
          </div>
          <button type="submit" class="btn btn-primary btn-full">Setup Dashboard</button>
        </form>

        <!-- Login Form -->
        <form id="login-form" class="login-form">
          <div class="form-group">
            <label for="login-password">Password</label>
            <input type="password" id="login-password" placeholder="Enter your password" required>
          </div>
          <button type="submit" class="btn btn-primary btn-full">Sign In</button>
          <p id="login-error" class="error-text hidden"></p>
        </form>
      </div>
    </div>

    <!-- Main Dashboard -->
    <div id="dashboard-screen" class="screen">
      <!-- Sidebar -->
      <aside class="sidebar">
        <div class="sidebar-header">
          <div class="logo-icon small">N</div>
          <span class="logo-text">NodePIN</span>
        </div>
        <nav class="sidebar-nav">
          <a href="#" class="nav-item active" data-view="overview">
            <span class="nav-icon">&#9632;</span> Overview
          </a>
          <a href="#" class="nav-item" data-view="servers">
            <span class="nav-icon">&#9881;</span> Servers
          </a>
          <a href="#" class="nav-item" data-view="nodes">
            <span class="nav-icon">&#9678;</span> Nodes
          </a>
        </nav>
        <div class="sidebar-footer">
          <button id="btn-change-password" class="btn btn-ghost btn-sm">Change Password</button>
          <button id="btn-logout" class="btn btn-ghost btn-sm">Logout</button>
        </div>
      </aside>

      <!-- Main Content -->
      <main class="main-content">
        <!-- Overview View -->
        <div id="view-overview" class="view active">
          <div class="view-header">
            <h2>Overview</h2>
            <button id="btn-refresh-dashboard" class="btn btn-ghost btn-sm">Refresh</button>
          </div>
          <div class="stats-grid">
            <div class="stat-card">
              <div class="stat-label">Total Servers</div>
              <div class="stat-value" id="stat-total-servers">0</div>
            </div>
            <div class="stat-card">
              <div class="stat-label">Online Servers</div>
              <div class="stat-value online" id="stat-online-servers">0</div>
            </div>
            <div class="stat-card">
              <div class="stat-label">Total Nodes</div>
              <div class="stat-value" id="stat-total-nodes">0</div>
            </div>
            <div class="stat-card">
              <div class="stat-label">Running Nodes</div>
              <div class="stat-value online" id="stat-running-nodes">0</div>
            </div>
          </div>
          <div class="section">
            <h3>Nodes by Protocol</h3>
            <div id="protocol-breakdown" class="protocol-grid"></div>
          </div>
        </div>

        <!-- Servers View -->
        <div id="view-servers" class="view">
          <div class="view-header">
            <h2>Servers</h2>
            <button id="btn-add-server" class="btn btn-primary btn-sm">+ Add Server</button>
          </div>
          <div id="servers-list" class="cards-grid"></div>
        </div>

        <!-- Nodes View -->
        <div id="view-nodes" class="view">
          <div class="view-header">
            <h2>Sentinel Nodes</h2>
            <button id="btn-add-node" class="btn btn-primary btn-sm">+ Add Node</button>
          </div>
          <div class="filter-bar">
            <label>Filter by server:</label>
            <select id="filter-server">
              <option value="">All Servers</option>
            </select>
          </div>
          <div id="nodes-list" class="cards-grid"></div>
        </div>
      </main>
    </div>

    <!-- Modal Overlay -->
    <div id="modal-overlay" class="modal-overlay hidden">
      <div class="modal" id="modal-content">
        <div class="modal-header">
          <h3 id="modal-title">Modal</h3>
          <button class="modal-close" id="modal-close">&times;</button>
        </div>
        <div class="modal-body" id="modal-body"></div>
      </div>
    </div>

    <!-- Toast Notifications -->
    <div id="toast-container" class="toast-container"></div>
  </div>

  <script src="/app.js"></script>
</body>
</html>
