# ═══════════════════════════════════════════
# NodePIN — Decentralized Node Earning Orchestrator
#
# عزل: كل الموارد تبدأ بـ nodepin ولا تتعارض مع مشاريع أخرى.
# اختيار الشبكات: تُتحكم عبر profiles + ENABLED_NETWORKS في .env.
#
# كيف تضيف أو تحذف شبكة؟
#   1. أضف service جديد أسفل هذه القائمة مع profiles: [<name>].
#   2. أنشئ مجلد خاص تحت services/
#   3. أضف متغيراته في .env.example و .env، وأضف اسمه في ENABLED_NETWORKS.
# ═══════════════════════════════════════════

# ━━━━━━━━━━━ NETWORKS ━━━━━━━━━━━
networks:
  # شبكة داخلية معزولة خاصة بـ NodePIN فقط
  nodepin-net:
    name: nodepin-net
    driver: bridge

# ━━━━━━━━━━━ VOLUMES ━━━━━━━━━━━
volumes:
  nodepin_myst_data:
  nodepin_storj_data:
  nodepin_control_db:
  nodepin_caddy_data:
  nodepin_caddy_config:
  # أضف هنا عند إضافة شبكة جديدة

# ━━━━━━━━━━━ SERVICES ━━━━━━━━━━━
services:
  # ──────────────────────────────────────────
  # 1) Mysterium Network Client  (profile: mysterium)
  # ──────────────────────────────────────────
  myst_client:
    image: mysteriumnetwork/myst:latest
    container_name: nodepin_myst
    profiles: ["mysterium"]
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
    environment:
      - MYST_IDENTITY_PASSPHRASE=${MYST_IDENTITY_PASSPHRASE}
      - MYST_COUNTRY_FILTER=${MYST_COUNTRY_FILTER:-us}
      - MYST_MAX_SESSION_MINUTES=${MYST_MAX_SESSION_MINUTES:-30}
    volumes:
      - nodepin_myst_data:/var/lib/mysterium-node
    ports:
      - "${MYST_TEQUILAPI_PORT:-4050}:4050"   # TequilAPI
      - "${MYST_UI_PORT:-4449}:4449"          # Web UI
    networks:
      - nodepin-net
    labels:
      com.nodepin.project: "nodepin"
      com.nodepin.network: "mysterium"

  # ──────────────────────────────────────────
  # 2) Storj Node  (profile: storj)
  # ──────────────────────────────────────────
  storj-node:
    image: storjlabs/storagenode:latest
    container_name: nodepin_storj
    profiles: ["storj"]
    restart: unless-stopped
    environment:
      - WALLET=${STORJ_WALLET}
      - EMAIL=${STORJ_EMAIL}
      - ADDRESS=${NODEPIN_VPS_IP}:${STORJ_PORT:-28967}
      - STORAGE=${STORJ_STORAGE_SIZE:-500GB}
      - BANDWIDTH=${STORJ_BANDWIDTH:-100TB}
    volumes:
      - nodepin_storj_data:/app/config
      - /mnt/storj-storage:/app/storage
    ports:
      - "${STORJ_PORT:-28967}:28967/tcp"
      - "${STORJ_PORT:-28967}:28967/udp"
      - "${STORJ_DASHBOARD_PORT:-14002}:14002"  # Storj Web Dashboard
    networks:
      - nodepin-net
    labels:
      com.nodepin.project: "nodepin"
      com.nodepin.network: "storj"

  # ──────────────────────────────────────────
  # 3) Control Panel (Dashboard) — دائماً يعمل (بدون profile)
  # ──────────────────────────────────────────
  control-panel:
    build:
      context: ./services/control-panel
      dockerfile: Dockerfile
    container_name: nodepin_control_panel
    restart: unless-stopped
    environment:
      - PORT=${DASHBOARD_PORT:-3000}
      - API_KEY=${DASHBOARD_API_KEY:-}
      - DASHBOARD_PASSWORD=${DASHBOARD_PASSWORD:-}
      - SESSION_SECRET=${SESSION_SECRET:-}
      - COOKIE_SECURE=${COOKIE_SECURE:-false}
      - MYST_API_URL=${MYST_API_URL:-http://nodepin_myst:4050}
      - STORJ_API_URL=${STORJ_API_URL:-http://nodepin_storj:14002}
      - ENABLED_NETWORKS=${ENABLED_NETWORKS:-mysterium,storj}
      - DOCKER_SOCK=/var/run/docker.sock
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - nodepin_control_db:/app/data
    ports:
      - "${DASHBOARD_PORT:-3000}:${DASHBOARD_PORT:-3000}"
    networks:
      - nodepin-net
    labels:
      com.nodepin.project: "nodepin"
      com.nodepin.network: "control-panel"

  # ──────────────────────────────────────────
  # 4) Watchtower (اختياري) — دائماً يعمل
  #    محصور على حاويات NodePIN فقط حتى لا يلمس مشاريع أخرى.
  # ──────────────────────────────────────────
  watchtower:
    image: containrrr/watchtower:latest
    container_name: nodepin_watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_POLL_INTERVAL=3600
      # يراقب فقط الحاويات ذات label نفعّلها، لا كل السيرفر
      - WATCHTOWER_LABEL_ENABLE=true
    networks:
      - nodepin-net
    labels:
      com.nodepin.project: "nodepin"
      com.nodepin.network: "watchtower"
      com.centurylinklabs.watchtower.enable: "true"

  # ═══════════════════════════════════════════
  # 5) Caddy reverse proxy — automatic HTTPS (profile: https)
  #    Serves the dashboard over TLS via NODEPIN_DOMAIN.
  #    Enable by adding 'https' to ENABLED_NETWORKS.
  caddy:
    image: caddy:2-alpine
    container_name: nodepin_caddy
    profiles: ["https"]
    restart: unless-stopped
    environment:
      - NODEPIN_DOMAIN=${NODEPIN_DOMAIN}
      - DASHBOARD_PORT=${DASHBOARD_PORT:-3000}
    volumes:
      - ./services/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - nodepin_caddy_data:/data
      - nodepin_caddy_config:/config
    ports:
      - "80:80"
      - "443:443"
    networks:
      - nodepin-net
    depends_on:
      - control-panel
    labels:
      com.nodepin.project: "nodepin"
      com.nodepin.network: "caddy"
      com.centurylinklabs.watchtower.enable: "true"

  # ──────────────────────────────────────────
  # 6) PacketStream  (profile: packetstream)
  #    يشارك عرض النطاق (bandwidth) — شبكة خفيفة تناسب أي جهاز.
  # ──────────────────────────────────────────
  packetstream:
    image: packetstream/psclient:latest
    container_name: nodepin_packetstream
    profiles: ["packetstream"]
    restart: unless-stopped
    environment:
      - CID=${PACKETSTREAM_CID}
    networks:
      - nodepin-net
    labels:
      com.nodepin.project: "nodepin"
      com.nodepin.network: "packetstream"
      com.centurylinklabs.watchtower.enable: "true"

  # ──────────────────────────────────────────
  # 7) Grass  (profile: grass)
  #    يشارك عرض النطاق (bandwidth) — شبكة خفيفة تناسب أي جهاز.
  # ──────────────────────────────────────────
  grass:
    image: mrcolorrain/grass:latest
    container_name: nodepin_grass
    profiles: ["grass"]
    restart: unless-stopped
    environment:
      - GRASS_USER=${GRASS_USER}
      - GRASS_PASS=${GRASS_PASS}
    networks:
      - nodepin-net
    labels:
      com.nodepin.project: "nodepin"
      com.nodepin.network: "grass"
      com.centurylinklabs.watchtower.enable: "true"

  # — أضف شبكة جديدة أسفل هذا الخط —
  #   تذكّر: profiles: ["<name>"] + labels + nodepin-net
  # ═══════════════════════════════════════════
