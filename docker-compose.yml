# ═══════════════════════════════════════════
# NodePIN — Decentralized Node Earning Orchestrator
#
# عزل: كل الموارد تبدأ بـ nodepin ولا تتعارض مع مشاريع أخرى.
# اختيار الشبكات: تُتحكم عبر profiles + ENABLED_NETWORKS في .env.
#
# كيف تضيف أو تحذف شبكة؟
#   1. أضف service جديد أسفل هذه القائمة مع profiles: [<name>].
#   2. أنشئ مجلد خاص تحت services/
#   3. أضف متغيراته في .env.example و .env، وأضف اسمه في ENABLED_NETWORKS.
# ═══════════════════════════════════════════

# ━━━━━━━━━━━ NETWORKS ━━━━━━━━━━━
networks:
  nodepin-net:
    name: nodepin-net
    driver: bridge

# ━━━━━━━━━━━ VOLUMES ━━━━━━━━━━━
volumes:
  nodepin_myst_data:
  nodepin_storj_data:
  nodepin_control_db:
  nodepin_caddy_data:
  nodepin_caddy_config:
  nodepin_anyone_data:
  nodepin_nym_data:
  nodepin_nkn_data:

# ━━━━━━━━━━━ SERVICES ━━━━━━━━━━━
services:

  # ──────────────────────────────────────────
  # 1) Mysterium Network  (profile: mysterium)
  #    نود proxy لامركزي — يكسب MYST
  #    API محلي: TequilAPI :4050  ✅ أرباح حية
  # ──────────────────────────────────────────
  myst_client:
    image: mysteriumnetwork/myst:latest
    container_name: nodepin_myst
    command: --tequilapi.address=0.0.0.0 --tequilapi.port=4050 --ui.address=0.0.0.0 service --agreed-terms-and-conditions
    restart: "no"
    cap_add:
      - NET_ADMIN
    environment:
      - MYST_IDENTITY_PASSPHRASE=${MYST_IDENTITY_PASSPHRASE}
      - MYST_COUNTRY_FILTER=${MYST_COUNTRY_FILTER:-us}
      - MYST_MAX_SESSION_MINUTES=${MYST_MAX_SESSION_MINUTES:-30}
    volumes:
      - nodepin_myst_data:/var/lib/mysterium-node
    ports:
      - "${MYST_TEQUILAPI_PORT:-4050}:4050"
      - "${MYST_UI_PORT:-4449}:4449"
    networks:
      - nodepin-net
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "3"
    labels:
      com.nodepin.project: "nodepin"
      com.nodepin.network: "mysterium"
      com.centurylinklabs.watchtower.enable: "true"

  # ──────────────────────────────────────────
  # 2) Storj Node  (profile: storj)
  #    مشاركة تخزين لامركزي — يكسب STORJ
  #    API محلي: storagenode :14002  ✅ أرباح حية
  # ──────────────────────────────────────────
  storj-node:
    image: storjlabs/storagenode:latest
    container_name: nodepin_storj
    profiles: ["storj"]
    restart: "no"
    environment:
      - WALLET=${STORJ_WALLET}
      - EMAIL=${STORJ_EMAIL}
      - ADDRESS=${NODEPIN_VPS_IP}:${STORJ_PORT:-28967}
      - STORAGE=${STORJ_STORAGE_SIZE:-500GB}
      - BANDWIDTH=${STORJ_BANDWIDTH:-100TB}
    volumes:
      - nodepin_storj_data:/app/config
      - /mnt/storj-storage:/app/storage
    ports:
      - "${STORJ_PORT:-28967}:28967/tcp"
      - "${STORJ_PORT:-28967}:28967/udp"
      - "${STORJ_DASHBOARD_PORT:-14002}:14002"
    networks:
      - nodepin-net
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "3"
    labels:
      com.nodepin.project: "nodepin"
      com.nodepin.network: "storj"
      com.centurylinklabs.watchtower.enable: "true"


  # ──────────────────────────────────────────
  # 4) Traffmonetizer  (profile: traffmonetizer)
  #    مشاركة bandwidth — يكسب USD
  #    ❌ لا API محلي — راجع لوحتهم
  # ──────────────────────────────────────────
  traffmonetizer:
    image: traffmonetizer/cli_v2:latest
    container_name: nodepin_traffmonetizer
    profiles: ["traffmonetizer"]
    restart: "no"
    command: start accept --token ${TRAFFMONETIZER_TOKEN}
    networks:
      - nodepin-net
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "3"
    labels:
      com.nodepin.project: "nodepin"
      com.nodepin.network: "traffmonetizer"
      com.centurylinklabs.watchtower.enable: "true"


  # ──────────────────────────────────────────
  # 8) Control Panel — دائماً يعمل (بدون profile)
  # ──────────────────────────────────────────
  control-panel:
    build:
      context: ./services/control-panel
      dockerfile: Dockerfile
    container_name: nodepin_control_panel
    restart: "no"
    environment:
      - PORT=${DASHBOARD_PORT:-3000}
      - API_KEY=${DASHBOARD_API_KEY:-}
      - DASHBOARD_PASSWORD=${DASHBOARD_PASSWORD:-}
      - SESSION_SECRET=${SESSION_SECRET:-}
      - COOKIE_SECURE=${COOKIE_SECURE:-false}
      - MYST_API_URL=${MYST_API_URL:-http://nodepin_myst:4050}
      - MYST_API_PASSWORD=${MYST_API_PASSWORD:-mystberry}
      - STORJ_API_URL=${STORJ_API_URL:-http://nodepin_storj:14002}
      - ENABLED_NETWORKS=${ENABLED_NETWORKS:-}
      - DOCKER_SOCK=/var/run/docker.sock
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - nodepin_control_db:/app/data
    ports:
      - "${DASHBOARD_PORT:-3000}:${DASHBOARD_PORT:-3000}"
    networks:
      - nodepin-net
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "3"
    labels:
      com.nodepin.project: "nodepin"
      com.nodepin.network: "control-panel"

  # ──────────────────────────────────────────
  # 9) Watchtower — تحديث تلقائي (محرَك اختيار)
  # ──────────────────────────────────────────
  watchtower:
    profiles: ["watchtower"]
    image: ghcr.io/nicholas-fedor/watchtower:latest
    container_name: nodepin_watchtower
    restart: "no"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_POLL_INTERVAL=${WATCHTOWER_INTERVAL:-3600}
      - WATCHTOWER_LABEL_ENABLE=false
    networks:
      - nodepin-net
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "3"
    labels:
      com.nodepin.project: "nodepin"
      com.nodepin.network: "watchtower"

  # ──────────────────────────────────────────
  # 10) Caddy — HTTPS تلقائي  (profile: https)
  # ──────────────────────────────────────────
  caddy:
    image: caddy:2-alpine
    container_name: nodepin_caddy
    profiles: ["https"]
    restart: "no"
    environment:
      - NODEPIN_DOMAIN=${NODEPIN_DOMAIN}
      - DASHBOARD_PORT=${DASHBOARD_PORT:-3000}
    volumes:
      - ./services/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - nodepin_caddy_data:/data
      - nodepin_caddy_config:/config
    ports:
      - "80:80"
      - "443:443"
    networks:
      - nodepin-net
    depends_on:
      - control-panel
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "3"
    labels:
      com.nodepin.project: "nodepin"
      com.nodepin.network: "caddy"
      com.centurylinklabs.watchtower.enable: "true"






  # ──────────────────────────────────────────
  # 18) Proxyrack  (profile: proxyrack)
  #     Proxy network — يكسب USD
  #     ❌ لا API محلي — راجع لوحتهم
  # ──────────────────────────────────────────
  proxyrack:
    image: proxyrack/pop:latest
    container_name: nodepin_proxyrack
    profiles: ["proxyrack"]
    restart: "no"
    environment:
      - UUID=${PROXYRACK_UUID}
      - API_KEY=${PROXYRACK_API_KEY}
    networks:
      - nodepin-net
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "3"
    labels:
      com.nodepin.project: "nodepin"
      com.nodepin.network: "proxyrack"
      com.centurylinklabs.watchtower.enable: "true"



  # ═══════════════════════════════════════════
  # — أضف شبكة جديدة أسفل هذا الخط —
  #   profiles: ["<name>"] + labels + nodepin-net
  # ═══════════════════════════════════════════


  # ──────────────────────────────────────────
  # 22) Anyone Protocol Relay  (profile: anyone)
  #     Decentralized onion routing network — earns ANYONE
  #     ❌ no local API — check dashboard.anyone.io
  # ──────────────────────────────────────────
  anyone:
    image: ghcr.io/anyone-protocol/ator-protocol:latest
    container_name: nodepin_anyone
    profiles: ["anyone"]
    restart: "no"
    init: true
    user: "0:0"
    ports:
      - "${ANYONE_PORT:-9001}:9001"
    volumes:
      - nodepin_anyone_data:/var/lib/anon
      - ./services/anyone/anonrc:/etc/anon/anonrc:ro
    networks:
      - nodepin-net
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "3"
    labels:
      com.nodepin.project: "nodepin"
      com.nodepin.network: "anyone"
      com.centurylinklabs.watchtower.enable: "true"

  # ──────────────────────────────────────────
  # 24) Nym Network Node (profile: nym)
  #     Decentralized privacy mixnet — earns NYM
  #     ❌ no local API — check mixnet dashboard
  # ──────────────────────────────────────────
  nym:
    image: nymtech/nym-node:latest
    container_name: nodepin_nym
    profiles: ["nym"]
    restart: "no"
    cpus: "2.0"
    mem_limit: "4g"
    environment:
      - NYM_NODE_ID=${NYM_NODE_ID:-default-nym-node}
    volumes:
      - nodepin_nym_data:/root/.nym
    ports:
      - "${NYM_PORT_MIXNET:-1789}:1789"
      - "${NYM_PORT_VERLOC:-1790}:1790"
      - "${NYM_PORT_API:-8080}:8080"
    networks:
      - nodepin-net
    command: ["run", "--mode", "mixnode", "--host", "${NODEPIN_VPS_IP}", "--http-bind-address", "0.0.0.0:8080"]
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "3"
    labels:
      com.nodepin.project: "nodepin"
      com.nodepin.network: "nym"
      com.centurylinklabs.watchtower.enable: "true"

  # ──────────────────────────────────────────
  # 25) NKN Node (profile: nkn)
  #     Decentralized data transmission network — earns NKN
  #     ❌ no local API — check NKN explorer
  # ──────────────────────────────────────────
  nkn:
    image: nknorg/nkn:latest
    container_name: nodepin_nkn
    profiles: ["nkn"]
    restart: "no"
    cpus: "2.0"
    mem_limit: "4g"
    environment:
      - NKN_BENEFICIARY_ADDR=${NKN_BENEFICIARY_ADDR}
      - NKN_WALLET_PASSWORD=${NKN_WALLET_PASSWORD}
    volumes:
      - nodepin_nkn_data:/nkn/data
      - ./services/nkn/entrypoint.sh:/entrypoint.sh
    ports:
      - "30001:30001"
      - "30002:30002"
      - "30003:30003"
      - "30004:30004"
      - "30005:30005"
    networks:
      - nodepin-net
    entrypoint: ["/bin/sh", "/entrypoint.sh"]
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "3"
    labels:
      com.nodepin.project: "nodepin"
      com.nodepin.network: "nkn"
      com.centurylinklabs.watchtower.enable: "true"

  # ──────────────────────────────────────────
  # 26) BlockMesh Node (profile: blockmesh)
  #     Decentralized AI & bandwidth sharing — earns POINTS
  #     ❌ no local API — check BlockMesh dashboard
  # ──────────────────────────────────────────
  blockmesh:
    build:
      context: ./services/blockmesh
      dockerfile: Dockerfile
    container_name: nodepin_blockmesh
    profiles: ["blockmesh"]
    restart: "no"
    cpus: "0.5"
    mem_limit: "256m"
    environment:
      - BLOCKMESH_EMAIL=${BLOCKMESH_EMAIL}
      - BLOCKMESH_PASSWORD=${BLOCKMESH_PASSWORD}
    networks:
      - nodepin-net
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "3"
    labels:
      com.nodepin.project: "nodepin"
      com.nodepin.network: "blockmesh"
      com.centurylinklabs.watchtower.enable: "true"


