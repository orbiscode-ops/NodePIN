# ═══════════════════════════════════════════
# NodePIN — Decentralized Node Earning Orchestrator
#
# عزل: كل الموارد تبدأ بـ nodepin ولا تتعارض مع مشاريع أخرى.
# اختيار الشبكات: تُتحكم عبر profiles + ENABLED_NETWORKS في .env.
#
# كيف تضيف أو تحذف شبكة؟
#   1. أضف service جديد أسفل هذه القائمة مع profiles: [<name>].
#   2. أنشئ مجلد خاص تحت services/
#   3. أضف متغيراته في .env.example و .env، وأضف اسمه في ENABLED_NETWORKS.
# ═══════════════════════════════════════════

# ━━━━━━━━━━━ NETWORKS ━━━━━━━━━━━
networks:
  nodepin-net:
    name: nodepin-net
    driver: bridge

# ━━━━━━━━━━━ VOLUMES ━━━━━━━━━━━
volumes:
  nodepin_myst_data:
  nodepin_storj_data:
  nodepin_control_db:
  nodepin_caddy_data:
  nodepin_caddy_config:
  nodepin_bitping_data:
  nodepin_meson_data:
  nodepin_huddle01_data:
  nodepin_titan_data:
  nodepin_anyone_data:

# ━━━━━━━━━━━ SERVICES ━━━━━━━━━━━
services:

  # ──────────────────────────────────────────
  # 1) Mysterium Network  (profile: mysterium)
  #    نود proxy لامركزي — يكسب MYST
  #    API محلي: TequilAPI :4050  ✅ أرباح حية
  # ──────────────────────────────────────────
  myst_client:
    image: mysteriumnetwork/myst:latest
    container_name: nodepin_myst
    command: --tequilapi.address=0.0.0.0 --tequilapi.port=4050 --ui.address=0.0.0.0 service --agreed-terms-and-conditions
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
    environment:
      - MYST_IDENTITY_PASSPHRASE=${MYST_IDENTITY_PASSPHRASE}
      - MYST_COUNTRY_FILTER=${MYST_COUNTRY_FILTER:-us}
      - MYST_MAX_SESSION_MINUTES=${MYST_MAX_SESSION_MINUTES:-30}
    volumes:
      - nodepin_myst_data:/var/lib/mysterium-node
    ports:
      - "${MYST_TEQUILAPI_PORT:-4050}:4050"
      - "${MYST_UI_PORT:-4449}:4449"
    networks:
      - nodepin-net
    labels:
      com.nodepin.project: "nodepin"
      com.nodepin.network: "mysterium"
      com.centurylinklabs.watchtower.enable: "true"

  # ──────────────────────────────────────────
  # 2) Storj Node  (profile: storj)
  #    مشاركة تخزين لامركزي — يكسب STORJ
  #    API محلي: storagenode :14002  ✅ أرباح حية
  # ──────────────────────────────────────────
  storj-node:
    image: storjlabs/storagenode:latest
    container_name: nodepin_storj
    profiles: ["storj"]
    restart: unless-stopped
    environment:
      - WALLET=${STORJ_WALLET}
      - EMAIL=${STORJ_EMAIL}
      - ADDRESS=${NODEPIN_VPS_IP}:${STORJ_PORT:-28967}
      - STORAGE=${STORJ_STORAGE_SIZE:-500GB}
      - BANDWIDTH=${STORJ_BANDWIDTH:-100TB}
    volumes:
      - nodepin_storj_data:/app/config
      - /mnt/storj-storage:/app/storage
    ports:
      - "${STORJ_PORT:-28967}:28967/tcp"
      - "${STORJ_PORT:-28967}:28967/udp"
      - "${STORJ_DASHBOARD_PORT:-14002}:14002"
    networks:
      - nodepin-net
    labels:
      com.nodepin.project: "nodepin"
      com.nodepin.network: "storj"
      com.centurylinklabs.watchtower.enable: "true"


  # ──────────────────────────────────────────
  # 4) Traffmonetizer  (profile: traffmonetizer)
  #    مشاركة bandwidth — يكسب USD
  #    ❌ لا API محلي — راجع لوحتهم
  # ──────────────────────────────────────────
  traffmonetizer:
    image: traffmonetizer/cli_v2:latest
    container_name: nodepin_traffmonetizer
    profiles: ["traffmonetizer"]
    restart: unless-stopped
    command: start accept --token ${TRAFFMONETIZER_TOKEN}
    networks:
      - nodepin-net
    labels:
      com.nodepin.project: "nodepin"
      com.nodepin.network: "traffmonetizer"
      com.centurylinklabs.watchtower.enable: "true"

  # ──────────────────────────────────────────
  # 5) IPRoyal Pawns  (profile: iproyal)
  #    مشاركة bandwidth — يكسب USD
  #    ❌ لا API محلي — راجع لوحتهم
  # ──────────────────────────────────────────
  iproyal:
    image: iproyal/pawns-cli:latest
    container_name: nodepin_iproyal
    profiles: ["iproyal"]
    restart: unless-stopped
    command: -accept-tos -email=${IPROYAL_EMAIL} -password=${IPROYAL_PASS} -device-name=${IPROYAL_DEVICE:-nodepin} -traffic-limit=0
    networks:
      - nodepin-net
    labels:
      com.nodepin.project: "nodepin"
      com.nodepin.network: "iproyal"
      com.centurylinklabs.watchtower.enable: "true"

  # ──────────────────────────────────────────
  # 6) Peer2Profit  (profile: peer2profit)
  #    مشاركة bandwidth — يكسب USD
  #    ❌ لا API محلي — راجع لوحتهم
  # ──────────────────────────────────────────
  peer2profit:
    image: peer2profit/peer2profit_linux:latest
    container_name: nodepin_peer2profit
    profiles: ["peer2profit"]
    restart: unless-stopped
    environment:
      - P2P_EMAIL=${PEER2PROFIT_EMAIL}
    networks:
      - nodepin-net
    labels:
      com.nodepin.project: "nodepin"
      com.nodepin.network: "peer2profit"
      com.centurylinklabs.watchtower.enable: "true"

  # ──────────────────────────────────────────
  # 7) Repocket  (profile: repocket)
  #    مشاركة bandwidth — يكسب USD
  #    ❌ لا API محلي — راجع لوحتهم
  # ──────────────────────────────────────────
  repocket:
    image: repocket/repocket:latest
    container_name: nodepin_repocket
    profiles: ["repocket"]
    restart: unless-stopped
    environment:
      - RP_EMAIL=${REPOCKET_EMAIL}
      - RP_API_KEY=${REPOCKET_API_KEY}
    networks:
      - nodepin-net
    labels:
      com.nodepin.project: "nodepin"
      com.nodepin.network: "repocket"
      com.centurylinklabs.watchtower.enable: "true"

  # ──────────────────────────────────────────
  # 8) Control Panel — دائماً يعمل (بدون profile)
  # ──────────────────────────────────────────
  control-panel:
    build:
      context: ./services/control-panel
      dockerfile: Dockerfile
    container_name: nodepin_control_panel
    restart: unless-stopped
    environment:
      - PORT=${DASHBOARD_PORT:-3000}
      - API_KEY=${DASHBOARD_API_KEY:-}
      - DASHBOARD_PASSWORD=${DASHBOARD_PASSWORD:-}
      - SESSION_SECRET=${SESSION_SECRET:-}
      - COOKIE_SECURE=${COOKIE_SECURE:-false}
      - MYST_API_URL=${MYST_API_URL:-http://nodepin_myst:4050}
      - STORJ_API_URL=${STORJ_API_URL:-http://nodepin_storj:14002}

      - BITPING_API_URL=${BITPING_API_URL:-http://nodepin_bitping:9090}
      - MESON_API_URL=${MESON_API_URL:-http://nodepin_meson:19090}
      - HUDDLE01_API_URL=${HUDDLE01_API_URL:-http://nodepin_huddle01:4001}
      - ENABLED_NETWORKS=${ENABLED_NETWORKS:-}
      - DOCKER_SOCK=/var/run/docker.sock
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - nodepin_control_db:/app/data
    ports:
      - "${DASHBOARD_PORT:-3000}:${DASHBOARD_PORT:-3000}"
    networks:
      - nodepin-net
    labels:
      com.nodepin.project: "nodepin"
      com.nodepin.network: "control-panel"

  # ──────────────────────────────────────────
  # 9) Watchtower — تحديث تلقائي (محرَك اختيار)
  # ──────────────────────────────────────────
  watchtower:
    profiles: ["watchtower"]
    image: ghcr.io/nicholas-fedor/watchtower:latest
    container_name: nodepin_watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_POLL_INTERVAL=${WATCHTOWER_INTERVAL:-3600}
      - WATCHTOWER_LABEL_ENABLE=false
    networks:
      - nodepin-net
    labels:
      com.nodepin.project: "nodepin"
      com.nodepin.network: "watchtower"

  # ──────────────────────────────────────────
  # 10) Caddy — HTTPS تلقائي  (profile: https)
  # ──────────────────────────────────────────
  caddy:
    image: caddy:2-alpine
    container_name: nodepin_caddy
    profiles: ["https"]
    restart: unless-stopped
    environment:
      - NODEPIN_DOMAIN=${NODEPIN_DOMAIN}
      - DASHBOARD_PORT=${DASHBOARD_PORT:-3000}
    volumes:
      - ./services/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - nodepin_caddy_data:/data
      - nodepin_caddy_config:/config
    ports:
      - "80:80"
      - "443:443"
    networks:
      - nodepin-net
    depends_on:
      - control-panel
    labels:
      com.nodepin.project: "nodepin"
      com.nodepin.network: "caddy"
      com.centurylinklabs.watchtower.enable: "true"

  # ──────────────────────────────────────────
  # 11) EarnApp (Bright Data)  (profile: earnapp)
  #     مشاركة bandwidth — يكسب USD
  #     ❌ لا API محلي — راجع لوحتهم
  # ──────────────────────────────────────────
  earnapp:
    image: mrcolorrain/earnapp:latest
    container_name: nodepin_earnapp
    profiles: ["earnapp"]
    restart: unless-stopped
    environment:
      - EARNAPP_UUID=${EARNAPP_UUID}
    networks:
      - nodepin-net
    labels:
      com.nodepin.project: "nodepin"
      com.nodepin.network: "earnapp"
      com.centurylinklabs.watchtower.enable: "true"

  # ──────────────────────────────────────────
  # 12) Bitping  (profile: bitping)
  #     network monitoring لامركزي — يكسب NOIA
  #     ✅ أرباح حية عبر Bitping API
  # ──────────────────────────────────────────
  bitping:
    image: bitping/bitping-node:latest
    container_name: nodepin_bitping
    profiles: ["bitping"]
    restart: unless-stopped
    environment:
      - BITPING_EMAIL=${BITPING_EMAIL}
      - BITPING_PASSWORD=${BITPING_PASSWORD}
    volumes:
      - nodepin_bitping_data:/root/.bitping
    networks:
      - nodepin-net
    labels:
      com.nodepin.project: "nodepin"
      com.nodepin.network: "bitping"
      com.centurylinklabs.watchtower.enable: "true"

  # ──────────────────────────────────────────
  # 13) Nodepay  (profile: nodepay)
  #     AI bandwidth network — يكسب NC tokens
  #     ❌ لا API محلي — راجع لوحتهم
  # ──────────────────────────────────────────
  nodepay:
    image: anthill/nodepay:latest
    container_name: nodepin_nodepay
    profiles: ["nodepay"]
    restart: unless-stopped
    environment:
      - NP_TOKEN=${NODEPAY_TOKEN}
    networks:
      - nodepin-net
    labels:
      com.nodepin.project: "nodepin"
      com.nodepin.network: "nodepay"
      com.centurylinklabs.watchtower.enable: "true"


  # ──────────────────────────────────────────
  # 15) PacketStream  (profile: packetstream)
  #     مشاركة bandwidth — يكسب USD
  #     ❌ لا API محلي — راجع لوحتهم
  # ──────────────────────────────────────────
  packetstream:
    image: packetstream/psclient:latest
    container_name: nodepin_packetstream
    profiles: ["packetstream"]
    restart: unless-stopped
    environment:
      - CID=${PACKETSTREAM_CID}
    networks:
      - nodepin-net
    labels:
      com.nodepin.project: "nodepin"
      com.nodepin.network: "packetstream"
      com.centurylinklabs.watchtower.enable: "true"

  # ──────────────────────────────────────────
  # 16) Meson Network  (profile: meson)
  #     CDN لامركزي — يكسب MSN tokens
  #     ✅ أرباح حية عبر Meson local API :19090
  # ──────────────────────────────────────────
  meson:
    image: meson/meson-node:latest
    container_name: nodepin_meson
    profiles: ["meson"]
    restart: unless-stopped
    environment:
      - TOKEN=${MESON_TOKEN}
    volumes:
      - nodepin_meson_data:/root/.meson
    ports:
      - "${MESON_PORT:-19090}:19090"
    networks:
      - nodepin-net
    labels:
      com.nodepin.project: "nodepin"
      com.nodepin.network: "meson"
      com.centurylinklabs.watchtower.enable: "true"

  # ──────────────────────────────────────────
  # 17) Gradient Network  (profile: gradient)
  #     AI bandwidth — يكسب GRAD tokens
  #     ❌ لا API محلي — راجع لوحتهم
  # ──────────────────────────────────────────
  gradient:
    image: community/gradient-node:latest
    container_name: nodepin_gradient
    profiles: ["gradient"]
    restart: unless-stopped
    environment:
      - GRADIENT_EMAIL=${GRADIENT_EMAIL}
      - GRADIENT_PASS=${GRADIENT_PASS}
    networks:
      - nodepin-net
    labels:
      com.nodepin.project: "nodepin"
      com.nodepin.network: "gradient"
      com.centurylinklabs.watchtower.enable: "true"

  # ──────────────────────────────────────────
  # 18) Proxyrack  (profile: proxyrack)
  #     Proxy network — يكسب USD
  #     ❌ لا API محلي — راجع لوحتهم
  # ──────────────────────────────────────────
  proxyrack:
    image: proxyrack/pop:latest
    container_name: nodepin_proxyrack
    profiles: ["proxyrack"]
    restart: unless-stopped
    environment:
      - UUID=${PROXYRACK_UUID}
      - API_KEY=${PROXYRACK_API_KEY}
    networks:
      - nodepin-net
    labels:
      com.nodepin.project: "nodepin"
      com.nodepin.network: "proxyrack"
      com.centurylinklabs.watchtower.enable: "true"

  # ──────────────────────────────────────────
  # 19) Uprock  (profile: uprock)
  #     Distributed AI inference — يكسب UPT tokens
  #     ❌ لا API محلي — راجع لوحتهم
  # ──────────────────────────────────────────
  uprock:
    image: uprock/node:latest
    container_name: nodepin_uprock
    profiles: ["uprock"]
    restart: unless-stopped
    environment:
      - UPROCK_EMAIL=${UPROCK_EMAIL}
      - UPROCK_PASSWORD=${UPROCK_PASSWORD}
    networks:
      - nodepin-net
    labels:
      com.nodepin.project: "nodepin"
      com.nodepin.network: "uprock"
      com.centurylinklabs.watchtower.enable: "true"

  # ──────────────────────────────────────────
  # 20) Huddle01 Media Node  (profile: huddle01)
  #     WebRTC/media لامركزي — يكسب HUDL tokens
  #     ✅ أرباح حية عبر Huddle01 local API :4001
  # ──────────────────────────────────────────
  huddle01:
    image: huddle01/media-node:latest
    container_name: nodepin_huddle01
    profiles: ["huddle01"]
    restart: unless-stopped
    environment:
      - API_SERVER=${HUDDLE01_API_SERVER:-https://api.huddle01.com}
      - API_KEY=${HUDDLE01_API_KEY}
    volumes:
      - nodepin_huddle01_data:/app/data
    ports:
      - "${HUDDLE01_PORT:-4001}:4001"
    networks:
      - nodepin-net
    labels:
      com.nodepin.project: "nodepin"
      com.nodepin.network: "huddle01"
      com.centurylinklabs.watchtower.enable: "true"

  # ──────────────────────────────────────────
  # 21) Titan Network  (profile: titan)
  #     Edge computing + storage — يكسب TTN tokens
  #     ❌ لا API محلي — راجع لوحتهم
  # ──────────────────────────────────────────
  titan:
    image: nezha123/titan-edge:latest
    container_name: nodepin_titan
    profiles: ["titan"]
    restart: unless-stopped
    environment:
      - TITAN_URL=${TITAN_URL:-https://cassini.titannet.io:2345/rpc/v0}
      - TITAN_HASH=${TITAN_HASH}
    volumes:
      - nodepin_titan_data:/root/.titanedge
    networks:
      - nodepin-net
    labels:
      com.nodepin.project: "nodepin"
      com.nodepin.network: "titan"
      com.centurylinklabs.watchtower.enable: "true"

  # ═══════════════════════════════════════════
  # — أضف شبكة جديدة أسفل هذا الخط —
  #   profiles: ["<name>"] + labels + nodepin-net
  # ═══════════════════════════════════════════

  # ──────────────────────────────────────────
  # 22) Anyone Protocol Relay  (profile: anyone)
  #     Decentralized onion routing network — earns ANYONE
  #     ❌ no local API — check dashboard.anyone.io
  # ──────────────────────────────────────────
  anyone:
    image: ghcr.io/anyone-protocol/ator-protocol:latest
    container_name: nodepin_anyone
    profiles: ["anyone"]
    restart: unless-stopped
    init: true
    ports:
      - "${ANYONE_PORT:-9001}:9001"
    volumes:
      - nodepin_anyone_data:/var/lib/anon
      - ./services/anyone/anonrc:/etc/anon/anonrc:ro
    networks:
      - nodepin-net
    labels:
      com.nodepin.project: "nodepin"
      com.nodepin.network: "anyone"
      com.centurylinklabs.watchtower.enable: "true"

