# ═══════════════════════════════════════════
# NodePIN — Decentralized Sentinel Node Orchestrator
# ═══════════════════════════════════════════

# ━━━━━━━━━━━ NETWORKS ━━━━━━━━━━━
networks:
  nodepin-net:
    name: nodepin-net
    driver: bridge

# ━━━━━━━━━━━ VOLUMES ━━━━━━━━━━━
volumes:
  nodepin_caddy_data:
  nodepin_caddy_config:

# ━━━━━━━━━━━ SERVICES ━━━━━━━━━━━
services:

  # ──────────────────────────────────────────
  # 1) Control Panel
  # ──────────────────────────────────────────
  control-panel:
    build:
      context: ./services/control-panel
      dockerfile: Dockerfile
    container_name: nodepin_control_panel
    cpus: "0.5"
    mem_limit: "256m"
    restart: unless-stopped
    environment:
      - PORT=${DASHBOARD_PORT:-3000}
      - API_KEY=${DASHBOARD_API_KEY:-}
      - DASHBOARD_PASSWORD=${DASHBOARD_PASSWORD:-}
      - SESSION_SECRET=${SESSION_SECRET:-}
      - COOKIE_SECURE=${COOKIE_SECURE:-false}
      - DOCKER_SOCK=/var/run/docker.sock
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./data:/app/data
      - ./manage-nodes.sh:/app/manage-nodes.sh
    ports:
      - "${DASHBOARD_PORT:-3000}:${DASHBOARD_PORT:-3000}"
    networks:
      - nodepin-net
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    labels:
      com.nodepin.project: "nodepin"
      com.nodepin.network: "control-panel"

  # ──────────────────────────────────────────
  # 2) Caddy — HTTPS Proxy (profile: https)
  # ──────────────────────────────────────────
  caddy:
    image: caddy:2-alpine
    container_name: nodepin_caddy
    profiles: ["https"]
    cpus: "0.25"
    mem_limit: "128m"
    restart: unless-stopped
    environment:
      - NODEPIN_DOMAIN=${NODEPIN_DOMAIN}
      - DASHBOARD_PORT=${DASHBOARD_PORT:-3000}
    volumes:
      - ./services/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - nodepin_caddy_data:/data
      - nodepin_caddy_config:/config
    ports:
      - "80:80"
      - "443:443"
    networks:
      - nodepin-net
    depends_on:
      - control-panel
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    labels:
      com.nodepin.project: "nodepin"
      com.nodepin.network: "caddy"
