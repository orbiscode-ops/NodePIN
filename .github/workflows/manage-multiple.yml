name: Manage Multiple Services (Manual Control)

on:
  workflow_dispatch:
    inputs:
      networks:
        description: "اكتب أسماء الشبكات مفصولة بفاصلة (مثال: mysterium, traffmonetizer, urnetwork)"
        required: true
        default: "mysterium, traffmonetizer, urnetwork"
        type: string
      action:
        description: "الإجراء المطلوب"
        required: true
        default: "start"
        type: choice
        options:
          - start
          - stop
          - restart

jobs:
  manage-multiple:
    name: ${{ github.event.inputs.action }} — Multiple Networks
    runs-on: ubuntu-latest
    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Execute Action on VPS for Multiple Networks
        run: |
          NETWORKS_INPUT="${{ github.event.inputs.networks }}"
          ACTION="${{ github.event.inputs.action }}"
          
          ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} "
            set -e
            cd ~/nodepin
            
            echo '📥 Pulling latest configuration from GitHub...'
            git pull origin main

            # تقسيم المدخلات بناءً على الفاصلة
            IFS=',' read -ra NETS <<< \"$NETWORKS_INPUT\"
            for net in \"\${NETS[@]}\"; do
              # إزالة الفراغات الزائدة
              net=\$(echo \"\$net\" | xargs)
              if [ -z \"\$net\" ]; then continue; fi

              # خريطة لربط اسم الشبكة باسم الـ Service في docker-compose
              case \"\$net\" in
                mysterium)      SERVICE=\"myst_client\" ;;
                storj)          SERVICE=\"storj-node\" ;;
                traffmonetizer) SERVICE=\"traffmonetizer\" ;;
                iproyal)        SERVICE=\"iproyal\" ;;
                peer2profit)    SERVICE=\"peer2profit\" ;;
                repocket)       SERVICE=\"repocket\" ;;
                earnapp)        SERVICE=\"earnapp\" ;;
                bitping)        SERVICE=\"bitping\" ;;
                packetstream)   SERVICE=\"packetstream\" ;;
                meson)          SERVICE=\"meson\" ;;
                gradient)       SERVICE=\"gradient\" ;;
                proxyrack)      SERVICE=\"proxyrack\" ;;
                uprock)         SERVICE=\"uprock\" ;;
                titan)          SERVICE=\"titan\" ;;
                anyone)         SERVICE=\"anyone\" ;;
                urnetwork)      SERVICE=\"urnetwork\" ;;
                *)              echo \"⚠️ Unknown network: \$net\"; continue ;;
              esac

              if [ '$ACTION' = 'start' ]; then
                echo \"🚀 Starting \$net (\$SERVICE)...\"
                docker compose --profile \$net up -d \$SERVICE
              elif [ '$ACTION' = 'stop' ]; then
                echo \"🛑 Stopping \$net (\$SERVICE)...\"
                docker compose --profile \$net stop \$SERVICE
              elif [ '$ACTION' = 'restart' ]; then
                echo \"🔄 Restarting \$net (\$SERVICE)...\"
                docker compose --profile \$net restart \$SERVICE
              fi
            done

            echo '📊 Current Status:'
            docker compose ps
          "
