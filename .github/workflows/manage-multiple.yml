name: Manage Multiple Services (Manual Control)

on:
  workflow_dispatch:
    inputs:
      action:
        description: "الإجراء المطلوب"
        required: true
        default: "start"
        type: choice
        options:
          - start
          - stop
          - restart
      mysterium:
        description: "Mysterium (mystnodes)"
        type: boolean
        default: false
      anyone:
        description: "Anyone Protocol (ATOR)"
        type: boolean
        default: false
      bitping:
        description: "Bitping"
        type: boolean
        default: false
      traffmonetizer:
        description: "Traffmonetizer"
        type: boolean
        default: false
      urnetwork:
        description: "URnetwork (BringYour)"
        type: boolean
        default: false
      storj:
        description: "Storj"
        type: boolean
        default: false
      iproyal:
        description: "IPRoyal Pawns"
        type: boolean
        default: false
      peer2profit:
        description: "Peer2Profit"
        type: boolean
        default: false
      repocket:
        description: "Repocket"
        type: boolean
        default: false
      earnapp:
        description: "EarnApp"
        type: boolean
        default: false
      gradient:
        description: "Gradient Network"
        type: boolean
        default: false
      proxyrack:
        description: "Proxyrack"
        type: boolean
        default: false
      titan:
        description: "Titan Network"
        type: boolean
        default: false

jobs:
  manage-multiple:
    name: ${{ github.event.inputs.action }} — Selected Networks
    runs-on: ubuntu-latest
    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Execute Action on VPS for Selected Networks
        run: |
          ACTION="${{ github.event.inputs.action }}"
          
          # بناء قائمة الشبكات المختارة بناءً على الشيك بوكس
          ITEMS=""
          if [ "${{ github.event.inputs.mysterium }}" = "true" ]; then ITEMS="$ITEMS mysterium:myst_client"; fi
          if [ "${{ github.event.inputs.anyone }}" = "true" ]; then ITEMS="$ITEMS anyone:anyone"; fi
          if [ "${{ github.event.inputs.bitping }}" = "true" ]; then ITEMS="$ITEMS bitping:bitping"; fi
          if [ "${{ github.event.inputs.traffmonetizer }}" = "true" ]; then ITEMS="$ITEMS traffmonetizer:traffmonetizer"; fi
          if [ "${{ github.event.inputs.urnetwork }}" = "true" ]; then ITEMS="$ITEMS urnetwork:urnetwork"; fi
          if [ "${{ github.event.inputs.storj }}" = "true" ]; then ITEMS="$ITEMS storj:storj-node"; fi
          if [ "${{ github.event.inputs.iproyal }}" = "true" ]; then ITEMS="$ITEMS iproyal:iproyal"; fi
          if [ "${{ github.event.inputs.peer2profit }}" = "true" ]; then ITEMS="$ITEMS peer2profit:peer2profit"; fi
          if [ "${{ github.event.inputs.repocket }}" = "true" ]; then ITEMS="$ITEMS repocket:repocket"; fi
          if [ "${{ github.event.inputs.earnapp }}" = "true" ]; then ITEMS="$ITEMS earnapp:earnapp"; fi
          if [ "${{ github.event.inputs.gradient }}" = "true" ]; then ITEMS="$ITEMS gradient:gradient"; fi
          if [ "${{ github.event.inputs.proxyrack }}" = "true" ]; then ITEMS="$ITEMS proxyrack:proxyrack"; fi
          if [ "${{ github.event.inputs.titan }}" = "true" ]; then ITEMS="$ITEMS titan:titan"; fi

          # التحقق من اختيار شبكة واحدة على الأقل
          if [ -z "$ITEMS" ]; then
            echo "❌ No networks selected! Please check at least one box."
            exit 1
          fi

          ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} "
            set -e
            cd ~/nodepin
            
            echo '📥 Pulling latest configuration from GitHub...'
            git pull origin main

            for item in $ITEMS; do
              net=\${item%%:*}
              service=\${item##*:}

              if [ '$ACTION' = 'start' ]; then
                echo \"🚀 Starting \$net (\$service)...\"
                docker compose --profile \$net up -d \$service
              elif [ '$ACTION' = 'stop' ]; then
                echo \"🛑 Stopping \$net (\$service)...\"
                docker compose --profile \$net stop \$service
              elif [ '$ACTION' = 'restart' ]; then
                echo \"🔄 Restarting \$net (\$service) with configuration refresh...\"
                docker compose --profile \$net up -d --force-recreate \$service
              fi
            done

            echo '📊 Current Status:'
            docker compose ps
          "
