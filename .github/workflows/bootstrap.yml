name: Bootstrap VPS (First Time Setup)

# يُشغَّل مرة واحدة لإعداد الـ VPS من الصفر:
# - تثبيت Docker
# - استنساخ المشروع
# - كتابة .env من GitHub Secrets مباشرة
# - تشغيل الشبكات المختارة

on:
  workflow_dispatch:
    inputs:
      networks:
        description: "الشبكات المراد تشغيلها (مفصولة بفاصلة)"
        required: true
        default: "mysterium,storj"
        type: string
      confirm:
        description: "اكتب 'yes' للتأكيد"
        required: true
        type: string

jobs:
  bootstrap:
    name: Bootstrap VPS
    runs-on: ubuntu-latest
    environment: production
    if: ${{ github.event.inputs.confirm == 'yes' }}

    steps:
      - uses: actions/checkout@v4

      # ── إعداد SSH ──
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null

      # ── تثبيت Docker إن لم يكن موجوداً ──
      - name: Install Docker
        run: |
          ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} '
            set -e
            if command -v docker &>/dev/null; then
              echo "✅ Docker already installed: $(docker --version)"
            else
              echo "📦 Installing Docker..."
              curl -fsSL https://get.docker.com | sh
              systemctl enable docker
              systemctl start docker
              echo "✅ Docker installed"
            fi
            echo "✅ $(docker compose version 2>/dev/null || echo 'compose not found')"
          '

      # ── استنساخ أو تحديث المشروع ──
      - name: Clone / update repository
        run: |
          ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} '
            set -e
            if [ -d ~/nodepin/.git ]; then
              echo "📁 Updating existing repo..."
              cd ~/nodepin && git pull origin main
            else
              echo "📥 Cloning NodePIN..."
              git clone https://github.com/${{ github.repository }}.git ~/nodepin
            fi
            echo "✅ Repo ready at ~/nodepin"
          '

      # ── كتابة .env من GitHub Secrets ──
      - name: Write .env from secrets
        run: |
          ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} "
            set -e
            cd ~/nodepin

            echo 'Writing .env from GitHub Secrets...'
            cat > .env << 'ENVEOF'
          # ═══════════════════════════════════════════
          # NodePIN — Auto-generated by GitHub Actions
          # ═══════════════════════════════════════════

          COMPOSE_PROJECT_NAME=nodepin
          ENABLED_NETWORKS=${{ github.event.inputs.networks }}

          # ── Global ──
          NODEPIN_VPS_IP=${{ secrets.VPS_HOST }}
          NODEPIN_DOMAIN=${{ secrets.NODEPIN_DOMAIN }}
          NODEPIN_TIMEZONE=Asia/Riyadh

          # ── Ports ──
          DASHBOARD_PORT=3000
          MYST_TEQUILAPI_PORT=4050
          MYST_UI_PORT=4449
          STORJ_PORT=28967
          STORJ_DASHBOARD_PORT=14002

          # ── Dashboard ──
          DASHBOARD_PASSWORD=${{ secrets.DASHBOARD_PASSWORD }}
          SESSION_SECRET=${{ secrets.SESSION_SECRET }}
          DASHBOARD_API_KEY=${{ secrets.DASHBOARD_API_KEY }}
          COOKIE_SECURE=false

          # ── Mysterium ──
          MYST_IDENTITY_PASSPHRASE=${{ secrets.MYST_IDENTITY_PASSPHRASE }}
          MYST_COUNTRY_FILTER=us
          MYST_MAX_SESSION_MINUTES=30
          MYST_API_URL=http://nodepin_myst:4050

          # ── Storj ──
          STORJ_WALLET=${{ secrets.STORJ_WALLET }}
          STORJ_EMAIL=${{ secrets.STORJ_EMAIL }}
          STORJ_STORAGE_SIZE=${{ secrets.STORJ_STORAGE_SIZE || '500GB' }}
          STORJ_BANDWIDTH=100TB
          STORJ_API_URL=http://nodepin_storj:14002

          # ── Honeygain ──
          HONEYGAIN_EMAIL=${{ secrets.HONEYGAIN_EMAIL }}
          HONEYGAIN_PASS=${{ secrets.HONEYGAIN_PASS }}
          HONEYGAIN_DEVICE=nodepin

          # ── Traffmonetizer ──
          TRAFFMONETIZER_TOKEN=${{ secrets.TRAFFMONETIZER_TOKEN }}

          # ── IPRoyal ──
          IPROYAL_EMAIL=${{ secrets.IPROYAL_EMAIL }}
          IPROYAL_PASS=${{ secrets.IPROYAL_PASS }}

          # ── Peer2Profit ──
          PEER2PROFIT_EMAIL=${{ secrets.PEER2PROFIT_EMAIL }}

          # ── Repocket ──
          REPOCKET_EMAIL=${{ secrets.REPOCKET_EMAIL }}
          REPOCKET_API_KEY=${{ secrets.REPOCKET_API_KEY }}
          ENVEOF

            chmod 600 .env
            echo '✅ .env written successfully'
          "

      # ── إنشاء مجلدات التخزين ──
      - name: Create storage directories
        run: |
          ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} '
            mkdir -p /mnt/storj-storage
            echo "✅ Storage directories ready"
          '

      # ── تشغيل الشبكات ──
      - name: Start networks
        run: |
          NETWORKS="${{ github.event.inputs.networks }}"
          ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} "
            set -e
            cd ~/nodepin

            # بناء profile flags من ENABLED_NETWORKS
            PROFILE_FLAGS=\$(echo '$NETWORKS' | tr ',' '\n' | sed 's/^/--profile /' | tr '\n' ' ')

            echo '🚀 Starting: $NETWORKS'
            docker compose \$PROFILE_FLAGS pull
            docker compose \$PROFILE_FLAGS up -d

            echo '📊 Container status:'
            docker compose ps
          "

      # ── ملخص ──
      - name: Summary
        run: |
          echo "✅ Bootstrap complete!"
          echo "Dashboard: http://${{ secrets.VPS_HOST }}:3000"
          echo "Networks: ${{ github.event.inputs.networks }}"
