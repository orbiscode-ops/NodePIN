name: Bootstrap VPS (First Time Setup)

# يُشغَّل مرة واحدة لإعداد الـ VPS من الصفر:
# - تثبيت Docker
# - استنساخ المشروع
# - كتابة .env من GitHub Secrets مباشرة
# - تشغيل الشبكات المختارة

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: "اكتب 'yes' للتأكيد"
        required: true
        type: string

jobs:
  bootstrap:
    name: Bootstrap VPS
    runs-on: ubuntu-latest
    environment: production
    if: ${{ github.event.inputs.confirm == 'yes' }}

    steps:
      - uses: actions/checkout@v4

      # ── إعداد SSH ──
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null

      # ── تثبيت Docker إن لم يكن موجوداً ──
      - name: Install Docker
        run: |
          ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} '
            set -e
            if command -v docker &>/dev/null; then
              echo "✅ Docker already installed: $(docker --version)"
            else
              echo "📦 Installing Docker..."
              curl -fsSL https://get.docker.com | sh
              systemctl enable docker
              systemctl start docker
              echo "✅ Docker installed"
            fi
            echo "✅ $(docker compose version 2>/dev/null || echo 'compose not found')"
          '

      # ── استنساخ أو تحديث المشروع ──
      - name: Clone / update repository
        run: |
          ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} '
            set -e
            if [ -d ~/nodepin/.git ]; then
              echo "📁 Updating existing repo..."
              cd ~/nodepin && git pull origin main
            else
              echo "📥 Cloning NodePIN..."
              git clone https://github.com/${{ github.repository }}.git ~/nodepin
            fi
            echo "✅ Repo ready at ~/nodepin"
          '

      # ── كتابة .env من GitHub Secrets (أساسيات فقط) ──
      # قيم الشبكات تُضبط لاحقاً من Setup Wizard في لوحة التحكم
      - name: Write .env from secrets
        run: |
          # توليد SESSION_SECRET عشوائي
          SESSION_SECRET=$(openssl rand -hex 32)

          ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} "
            set -e
            cd ~/nodepin

            # لا تكتب فوق .env موجود (لحماية قيم الشبكات المحفوظة)
            if [ -f .env ]; then
              echo '⚠️  .env already exists — updating core values only'
              # فقط حدّث القيم الأساسية
              sed -i 's|^NODEPIN_VPS_IP=.*|NODEPIN_VPS_IP=${{ secrets.VPS_HOST }}|' .env
              sed -i 's|^DASHBOARD_PASSWORD=.*|DASHBOARD_PASSWORD=${{ secrets.DASHBOARD_PASSWORD }}|' .env
            else
              echo 'Writing .env...'
              cat > .env << 'ENVEOF'
          # ═══════════════════════════════════════════
          # NodePIN — Auto-generated by GitHub Actions Bootstrap
          # قيم الشبكات تُضاف من لوحة التحكم: http://IP:3000/setup.html
          # ═══════════════════════════════════════════

          COMPOSE_PROJECT_NAME=nodepin
          ENABLED_NETWORKS=

          # ── Global ──
          NODEPIN_VPS_IP=${{ secrets.VPS_HOST }}
          NODEPIN_DOMAIN=${{ secrets.NODEPIN_DOMAIN }}
          NODEPIN_TIMEZONE=Asia/Riyadh

          # ── Ports ──
          DASHBOARD_PORT=3000
          MYST_TEQUILAPI_PORT=4050
          MYST_UI_PORT=4449
          STORJ_PORT=28967
          STORJ_DASHBOARD_PORT=14002

          # ── Dashboard Auth ──
          DASHBOARD_PASSWORD=${{ secrets.DASHBOARD_PASSWORD }}
          SESSION_SECRET=${SESSION_SECRET}
          COOKIE_SECURE=false
          ENVEOF
              chmod 600 .env
              echo '✅ .env written'
            fi
          "

      # ── إنشاء مجلدات التخزين ──
      - name: Create storage directories
        run: |
          ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} '
            mkdir -p /mnt/storj-storage
            echo "✅ Storage directories ready"
          '

      # ── تشغيل لوحة التحكم فقط ──
      # الشبكات تُضاف لاحقاً من: http://VPS_IP:3000/setup.html
      - name: Start control panel
        run: |
          ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} "
            set -e
            cd ~/nodepin
            docker compose up -d control-panel watchtower
            echo '📊 Status:'
            docker compose ps
          "

      # ── ملخص ──
      - name: Summary
        run: |
          echo "✅ Bootstrap complete!"
          echo ""
          echo "افتح لوحة التحكم لإعداد الشبكات:"
          echo "👉 http://${{ secrets.VPS_HOST }}:3000/setup.html"
