name: Manage Services (Manual Control)

on:
  workflow_dispatch:
    inputs:
      network:
        description: "الشبكة المراد إدارتها"
        required: true
        type: choice
        options:
          - mysterium
          - anyone
          - traffmonetizer
          - storj
          - proxyrack
          - nym
          - nkn
          - blockmesh
      action:
        description: "الإجراء المطلوب"
        required: true
        default: "start"
        type: choice
        options:
          - start
          - stop
          - restart

jobs:
  manage:
    name: ${{ github.event.inputs.action }} — ${{ github.event.inputs.network }}
    runs-on: ubuntu-latest
    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Execute Action on VPS
        run: |
          NETWORK="${{ github.event.inputs.network }}"
          ACTION="${{ github.event.inputs.action }}"
          
          # خريطة لربط اسم الشبكة باسم الـ Service في docker-compose
          case "$NETWORK" in
            mysterium)      SERVICE="myst_client" ;;
            storj)          SERVICE="storj-node" ;;
            traffmonetizer) SERVICE="traffmonetizer" ;;
            proxyrack)      SERVICE="proxyrack" ;;
            anyone)         SERVICE="anyone" ;;
            nym)            SERVICE="nym" ;;
            nkn)            SERVICE="nkn" ;;
            blockmesh)      SERVICE="blockmesh" ;;
            *)              SERVICE="" ;;
          esac

          ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} "
            set -e
            cd ~/nodepin
            
            echo '📥 Pulling latest configuration from GitHub...'
            git pull origin main

            if [ '$ACTION' = 'start' ]; then
              echo '🚀 Starting $NETWORK ($SERVICE)...'
              docker compose --profile $NETWORK up -d $SERVICE
            elif [ '$ACTION' = 'stop' ]; then
              echo '🛑 Stopping $NETWORK ($SERVICE)...'
              docker compose --profile $NETWORK stop $SERVICE
            elif [ '$ACTION' = 'restart' ]; then
              echo '🔄 Restarting $NETWORK ($SERVICE) with configuration refresh...'
              docker compose --profile $NETWORK up -d --force-recreate $SERVICE
            fi

            echo '📊 Status:'
            docker compose ps
          "
