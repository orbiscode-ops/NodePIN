name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: services/control-panel/package.json

      - name: Install dependencies
        run: npm install --no-audit --no-fund
        working-directory: services/control-panel

      - name: Run tests
        run: npm test
        working-directory: services/control-panel
