name: CI & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      network:
        description: "الشبكة المراد نشرها"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - mysterium
          - storj
          - traffmonetizer
          - iproyal
          - peer2profit
          - repocket
          - earnapp
          - bitping
          - packetstream
          - meson
          - gradient
          - proxyrack
          - uprock
          - titan
          - anyone

jobs:
  # ── 1) التحقق من صحة docker compose ──
  validate-compose:
    name: Validate Docker Compose
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Copy env example
        run: cp .env.example .env

      - name: Validate compose config
        env:
          NODEPIN_VPS_IP: "127.0.0.1"
        run: |
          docker compose --profile mysterium --profile storj config > /dev/null
          echo "✅ docker compose configuration is valid"

  # ── 2) اختبارات الوحدة للوحة التحكم ──
  test-control-panel:
    name: Test Control Panel
    runs-on: ubuntu-latest
    needs: validate-compose
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: services/control-panel/package-lock.json

      - name: Install dependencies
        run: npm install --no-audit --no-fund
        working-directory: services/control-panel

      - name: Run tests
        run: npm test
        working-directory: services/control-panel

  # ── 3) بناء صورة اللوحة (main فقط) ──
  build-control-panel:
    name: Build Control Panel Image
    runs-on: ubuntu-latest
    needs: [validate-compose, test-control-panel]
    if: github.event_name == 'workflow_dispatch'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./services/control-panel
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/nodepin-control-panel:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/nodepin-control-panel:latest

  # ── 4) تحديد الشبكة المستهدفة للتوزيع ──
  detect-target:
    name: Detect target network
    runs-on: ubuntu-latest
    needs: [validate-compose, test-control-panel]
    if: github.event_name == 'workflow_dispatch'
    outputs:
      network: ${{ steps.set-target.outputs.network }}
    steps:
      - uses: actions/checkout@v4

      - name: Determine network target
        id: set-target
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "network=${{ github.event.inputs.network }}" >> $GITHUB_OUTPUT
          else
            CHANGED=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || echo "")
            echo "Changed files: $CHANGED"

            HAS_MYST=$(echo "$CHANGED"    | grep -c "services/mysterium"    || true)
            HAS_STORJ=$(echo "$CHANGED"   | grep -c "services/storj"        || true)
            HAS_TM=$(echo "$CHANGED"      | grep -c "services/traffmonetizer" || true)
            HAS_IP=$(echo "$CHANGED"      | grep -c "services/iproyal"      || true)
            HAS_P2P=$(echo "$CHANGED"     | grep -c "services/peer2profit"  || true)
            HAS_RP=$(echo "$CHANGED"      | grep -c "services/repocket"     || true)
            HAS_BP=$(echo "$CHANGED"      | grep -c "services/bitping"      || true)
            HAS_ANY=$(echo "$CHANGED"     | grep -c "services/anyone"       || true)
            HAS_CORE=$(echo "$CHANGED"    | grep -cE "services/control-panel|docker-compose|Makefile|\.env\.example" || true)

            NET_COUNT=$(( (HAS_MYST>0)+(HAS_STORJ>0)+(HAS_TM>0)+(HAS_IP>0)+(HAS_P2P>0)+(HAS_RP>0)+(HAS_BP>0)+(HAS_ANY>0) ))

            if [ "$HAS_CORE" -gt 0 ] || [ "$NET_COUNT" -gt 1 ]; then
              echo "network=all" >> $GITHUB_OUTPUT
            elif [ "$HAS_MYST"  -gt 0 ]; then echo "network=mysterium"      >> $GITHUB_OUTPUT
            elif [ "$HAS_STORJ" -gt 0 ]; then echo "network=storj"          >> $GITHUB_OUTPUT
            elif [ "$HAS_TM"    -gt 0 ]; then echo "network=traffmonetizer" >> $GITHUB_OUTPUT
            elif [ "$HAS_IP"    -gt 0 ]; then echo "network=iproyal"        >> $GITHUB_OUTPUT
            elif [ "$HAS_P2P"   -gt 0 ]; then echo "network=peer2profit"    >> $GITHUB_OUTPUT
            elif [ "$HAS_RP"    -gt 0 ]; then echo "network=repocket"       >> $GITHUB_OUTPUT
            elif [ "$HAS_BP"    -gt 0 ]; then echo "network=bitping"        >> $GITHUB_OUTPUT
            elif [ "$HAS_ANY"   -gt 0 ]; then echo "network=anyone"         >> $GITHUB_OUTPUT
            else echo "network=all" >> $GITHUB_OUTPUT
            fi
          fi

  # ── 5) نشر على VPS ──
  deploy:
    name: Deploy — ${{ needs.detect-target.outputs.network }}
    runs-on: ubuntu-latest
    needs: [build-control-panel, detect-target]
    if: github.event_name == 'workflow_dispatch'
    environment: production
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Check VPS environment
        run: |
          ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} '
            set -e
            if ! command -v docker &>/dev/null; then
              echo "❌ Docker not found — run the bootstrap workflow first"; exit 1
            fi
            if ! docker compose version &>/dev/null; then
              echo "❌ Docker Compose not found"; exit 1
            fi
            echo "✅ $(docker --version)"
            echo "✅ $(docker compose version)"
          '

      # ══════════════════════════════════════════════════════
      # ✨ الجديد: كتابة .env كامل من GitHub Secrets
      # ══════════════════════════════════════════════════════
      - name: Generate .env from GitHub Secrets
        run: |
          SESSION_SECRET=$(openssl rand -hex 32)

          ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} "
            set -e
            cd ~/nodepin

            echo '📝 Writing .env from GitHub Secrets...'

            cat > .env << 'ENVEOF'
          # ═══════════════════════════════════════════
          # NodePIN — Auto-generated from GitHub Secrets
          # ⚠️ لا تعدّل هذا الملف يدوياً — يتم إنشاؤه تلقائياً عند كل deploy
          # ═══════════════════════════════════════════

          # ── Project Isolation ──
          COMPOSE_PROJECT_NAME=nodepin

          # ── Network Selection ──
          ENABLED_NETWORKS=${{ secrets.ENABLED_NETWORKS }}

          # ── Global ──
          NODEPIN_VPS_IP=${{ secrets.VPS_HOST }}
          NODEPIN_DOMAIN=${{ secrets.NODEPIN_DOMAIN }}
          NODEPIN_TIMEZONE=Asia/Riyadh

          # ── Ports ──
          DASHBOARD_PORT=3000
          MYST_TEQUILAPI_PORT=4050
          MYST_UI_PORT=4449
          STORJ_PORT=28967
          STORJ_DASHBOARD_PORT=14002

          # ── Dashboard Auth ──
          DASHBOARD_API_KEY=${{ secrets.DASHBOARD_API_KEY }}
          DASHBOARD_PASSWORD=${{ secrets.DASHBOARD_PASSWORD }}
          SESSION_SECRET=${SESSION_SECRET}
          COOKIE_SECURE=true

          # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
          # 1) Mysterium Network (mystnodes)
          # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
          MYST_IDENTITY_PASSPHRASE=${{ secrets.MYST_IDENTITY_PASSPHRASE }}
          MYST_CONSUMER_MODE=true
          MYST_COUNTRY_FILTER=us
          MYST_MAX_SESSION_MINUTES=30
          MYST_API_URL=http://nodepin_myst:4050
          MYST_API_PASSWORD=${{ secrets.MYST_API_PASSWORD }}

          # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
          # 2) Anyone Protocol
          # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
          ANYONE_NICKNAME=${{ secrets.ANYONE_NICKNAME }}
          ANYONE_WALLET=${{ secrets.ANYONE_WALLET }}
          ANYONE_PORT=9001

          # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
          # 3) Bitping
          # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
          BITPING_EMAIL=${{ secrets.BITPING_EMAIL }}
          BITPING_PASSWORD=${{ secrets.BITPING_PASSWORD }}
          BITPING_API_URL=http://nodepin_bitping:9090

          # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
          # 4) Storj
          # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
          STORJ_WALLET=${{ secrets.STORJ_WALLET }}
          STORJ_EMAIL=${{ secrets.STORJ_EMAIL }}
          STORJ_STORAGE_SIZE=500GB
          STORJ_BANDWIDTH=100TB
          STORJ_API_URL=http://nodepin_storj:14002

          # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
          # 5) Traffmonetizer
          # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
          TRAFFMONETIZER_TOKEN=${{ secrets.TRAFFMONETIZER_TOKEN }}

          # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
          # 6) IPRoyal Pawns
          # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
          IPROYAL_EMAIL=${{ secrets.IPROYAL_EMAIL }}
          IPROYAL_PASS=${{ secrets.IPROYAL_PASS }}
          IPROYAL_DEVICE=nodepin

          # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
          # 7) Peer2Profit
          # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
          PEER2PROFIT_EMAIL=${{ secrets.PEER2PROFIT_EMAIL }}

          # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
          # 8) Repocket
          # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
          REPOCKET_EMAIL=${{ secrets.REPOCKET_EMAIL }}
          REPOCKET_API_KEY=${{ secrets.REPOCKET_API_KEY }}

          # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
          # 9) EarnApp
          # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
          EARNAPP_UUID=${{ secrets.EARNAPP_UUID }}

          # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
          # 11) PacketStream
          # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
          PACKETSTREAM_CID=${{ secrets.PACKETSTREAM_CID }}

          # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
          # 12) Meson Network
          # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
          MESON_TOKEN=${{ secrets.MESON_TOKEN }}
          MESON_API_URL=http://nodepin_meson:19090
          MESON_PORT=19090

          # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
          # 13) Gradient
          # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
          GRADIENT_EMAIL=${{ secrets.GRADIENT_EMAIL }}
          GRADIENT_PASS=${{ secrets.GRADIENT_PASS }}

          # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
          # 14) Proxyrack
          # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
          PROXYRACK_UUID=${{ secrets.PROXYRACK_UUID }}
          PROXYRACK_API_KEY=${{ secrets.PROXYRACK_API_KEY }}

          # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
          # 15) Uprock
          # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
          UPROCK_EMAIL=${{ secrets.UPROCK_EMAIL }}
          UPROCK_PASSWORD=${{ secrets.UPROCK_PASSWORD }}

          # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
          # 17) Titan
          # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
          TITAN_HASH=${{ secrets.TITAN_HASH }}
          TITAN_URL=https://cassini.titannet.io:2345/rpc/v0
          ENVEOF

            chmod 600 .env
            echo '✅ .env written from GitHub Secrets'
          "

      # ══════════════════════════════════════════════════════
      # ✨ توليد anonrc لـ Anyone Protocol
      # ══════════════════════════════════════════════════════
      - name: Generate Anyone Protocol anonrc
        run: |
          ENABLED="${{ secrets.ENABLED_NETWORKS }}"
          if echo "$ENABLED" | grep -q "anyone"; then
            echo "📝 Generating anonrc for Anyone Protocol..."
            ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} "
              set -e
              cd ~/nodepin
              mkdir -p services/anyone

              NICK='${{ secrets.ANYONE_NICKNAME }}'
              WALLET='${{ secrets.ANYONE_WALLET }}'
              NICK=\${NICK:-nodepin_relay}
              WALLET=\${WALLET:-0x0000000000000000000000000000000000000000}

              cat > services/anyone/anonrc << ANONEOF
          User anond
          DataDirectory /var/lib/anon
          ControlSocket /var/lib/anon/control
          ControlSocketsGroupWritable 1
          CookieAuthentication 1
          CookieAuthFile /var/lib/anon/control.authcookie
          CookieAuthFileGroupReadable 1
          Log notice file /var/lib/anon/notices.log
          ORPort 9001
          ExitRelay 0
          Nickname \${NICK}
          ContactInfo @anon:\${WALLET}
          AgreeToTerms 1
          ANONEOF
              echo '✅ anonrc generated'
            "
          else
            echo "ℹ️  Anyone not in ENABLED_NETWORKS — skipping anonrc generation"
          fi

      - name: Deploy
        run: |
          NETWORK="${{ needs.detect-target.outputs.network }}"
          ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} "
            set -e
            cd ~/nodepin

            echo '📥 Resetting local changes and pulling latest code...'
            git reset --hard
            git pull origin main

            echo '🔨 Rebuilding control-panel image...'
            docker compose build --no-cache control-panel

            if [ '$NETWORK' = 'all' ]; then
              echo '🚀 Deploying all networks...'
              ENABLED=\$(grep '^ENABLED_NETWORKS=' .env 2>/dev/null | cut -d= -f2-)
              if [ -z \"\$ENABLED\" ]; then
                echo 'ℹ️  No ENABLED_NETWORKS — starting control-panel + watchtower'
                docker compose up -d control-panel watchtower
              else
                PROFILE_FLAGS=\$(echo \"\$ENABLED\" | tr ',' '\n' | sed 's/^/--profile /' | tr '\n' ' ')
                docker compose \$PROFILE_FLAGS up -d --build
              fi
            else
              echo '🚀 Deploying: $NETWORK'
              docker compose --profile $NETWORK pull
              docker compose --profile $NETWORK up -d
            fi

            echo '🔄 Restarting control-panel...'
            docker compose restart control-panel

            echo '📊 Status:'
            docker compose ps
          "

      - name: Summary
        if: always()
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            echo "✅ Deploy [${{ needs.detect-target.outputs.network }}] — SUCCESS"
            echo "📋 .env was auto-generated from GitHub Secrets"
          else
            echo "❌ Deploy [${{ needs.detect-target.outputs.network }}] — FAILED"
          fi
